body:
  text: 道德義第一法身義第二三寶義第三位業義第四道德義第一義曰道德者虛極之玄宗妙化之深致神功潛運則理在生成至德幽通則義該亭毒有無斯絶物我都忘此其致也故道德經云道生之德畜之又云大道泛兮玄德深遠西升經云道德混沌玄同也釋曰道者理也通者導也德者得也成也不喪也言理者謂理實虛無消魔經云夫道者無也言通者謂能通生萬法變通無壅河上公云道四通也言道者謂導執令忘引凡令聖自然經云導末歸本本即真性末即妄情也德言得者謂得於道果太平經云德者正相得也言成者謂成濟衆生令成極道此就果為名亦資成空行此就因為目德經云成之熟之也言不喪者謂上德不失德故云不喪也太平經云常得不喪也然道德玄絶自應無名開教引凡強立稱謂故寄彼無名之名表宣正理令識名之無名方了玄教故靈寶經云虛無常自然強名字大道又道德體用義者道義主無治物有病德義主有治世無惑陸先生云虛寂為道體虛無不通寂無不應玄靖法師以智慧為道體神通為道用又云道德一體而其二義一而不一二而不二不可説其有體有用無體無用蓋是無體為體體而無體無用為用用而無用然則無一法非其體無一義非其功也尋其體也離空離有非隂非陽視聽不得搏觸莫辨尋其用也能權能實可左可右以小容大大能居小體即無已故不可以議用又無窮故隨方示見又經明常可二道上下兩德者舊解云常寂之道義説無為凡有四義一者非攀緣識慮故無心二者無質礙分别故無形三者不為名言所得故無名四者無常不能遷改故無時具此四義故名常道賈法師云自應身已遷三清等法皆是可道盡是無常也上德是忘德下德是執德以是執德今明物情常執謂有常道可求不能悟理便成滯教老君演明道德正治此迷經云可道非常道非謂别有常道正言所是説道並非恆定不宜執以為常故係非常以為消遣此言説道為藥本治物迷迷病若消何道不得若知不得為得亦可不常為常也法身義第二義曰法身者至道淳精至真妙體表其四德應彼十方赴機於動寂之間度物於分化之際此其致也故升玄經云吾以立氣周流八極或號元始或號老君或號太上或為世師隨人所好為作法身本際經云於明淨觀觀見法身又云香花妓樂洞映法身釋曰法是軌儀身為氣象至人氣象可軌故曰法身原其應化身相稱號甚多總括本迹具為六種本有三稱迹有三名也故本際經云道身即是寂本又云又為迹本動寂用殊又云如是本身能生萬物又云生身是迹迹作邪本三稱者一者道身二者真身三者報身一道身者太平經云道無不導道無不生度人經云唯道為身本際經云即是真道亦名道身二真身者玉緯經云真淳堅也謂體無穢雜常住嶷然消魔經云近為真身本際經云我之真身清淨無礙三報身者報是酬答之名謂酬積劫之行本行經云致今之報為諸天所宗本際經云元始正身因無數劫久習妙行報得此身迹三名者一者應身二者分身三者化身一應身者應是應接謂隨機顯迹應接群生請問經云以無心而應衆生本際經云應物根性示色象故名應身亦曰生身言生身者隨順世法誕育形體也二分身者分是分散我一身散在多處身雖非一形相不殊本際經云分形散體無有限量止見一方故惟百億又云諸分身者是於報身起無礙用靈寶經云天尊分形百萬處處同時是男是女並見天尊俱如一地三化身者化是改變無常倏有欻無種種殊相非復本形定志經云天尊化作凡人從會中過本際經云我即化身種種示見人天六道隨緣施作倏有欻無權示色像又本迹體義者據道教經究法身正理通本迹不異不同迹之三身有其别體本之三稱體一義殊以其精智淳常曰真身淨虛通曰道氣象酬德是曰報身就氣精神乃成三義不可窮詰惟是一源既是法身當有妙體且言身言體豈無色無心舊云寂地本身以真一妙智為體故靈寶經云玄通大智慧源也色是纍礙之法九聖已還既滯欲纍並皆有色真道纍盡唯有妙心但此妙心具一切德寂不可見名為妙無動時乘迹同物有體心色雖妙物得見之故名妙有對本論迹迹無别體視是本身寂用稱為體耳正明法身至本無色無心而今説色説心皆為破並是為物豈有定耶為愛色衆生欲令捨色則言至道無色故西升經云道象無形端或為計心衆生言至道無心故請問經云道為無心宗或為斷無衆生則言俱有色心故本際經云無不知故亦名為心道眼見故亦名為色生神章經云形與神同不相遠離俱入道真或為雙愛色心衆生則言無色無心故本際經云不緣慮故故言非心無所礙故故名無色斯則非心非色能色能心即是不心為心不色為色既以不心為心無色為色亦以不得為德無體為體耳又法身萬德已自俱圓今舉四事用申歎美豈即以為定實且欲引物欣求見著見著才生便乖此理何謂四一者常存二者快樂三者自在四者清淨常存者謂湛然安住不遷不動不為無常無常所動乃是正常寶玄經云湛然常存道經云湛然常存也快樂者樂是怡豫也本際經云欣然微笑舉體怡豫又云安隱快樂自在者泛兮皆可無適不通在事任我故云自在寶玄經云出沒自在本際經云真一妙智自在無礙海空經云三者自在果清淨者慧心明鑒謂之清智體無疵故稱淨本際經云無染無穢是名清淨又云常住清淨也然法身道果治衆生病或衆生迷妄言百年之壽可常五欲之境可樂自計己身為我愛諸色始為淨不如是無常苦無我不淨聖人為此故示無常以高況下奪其所計故西升經云吾尚白首衰老孰免此明世無常也又云形為腦本痛癢寒溫吾拘於身知為大患此示苦也又天地之人物誰獨為常主此明無我又云吾本棄俗厭離世間此示世不淨身亦是世間為患人所惡是通不淨但執教者不知為破世人計常樂我淨之迷故説應身無常苦無主不淨便謂道果不足可欣定是為常等四為治此例故説道果是常是樂是我是淨也又本迹義例者有師云衆生本有法身衆德具足常樂宛然但為惑覆故不見耳猶如泥之雜水不見澄清萬里深坑沙底難覩本相見時義無有異一家云本有之時未有衆德但衆生有必得之理故言澄清湛然耳今難二解若本具衆德豈被惑覆遂為惑覆何德可尊若本無衆德今時始有則是無常又理是本有理可是常事既今有事應無常若理事俱常亦應理事俱本是故不然今明法身本非三世所攝何得已有見有常有耶亦未曾有無何論隱顯今言神本澄清者直是本來清淨竟無所有若迷此理即名惑覆若了此理即名性顯非是别有一理在衆生中説為法身是常是淨也有説云迹身無常本身是常又云常應為迹迹亦言常今明一往對緣亦有此説至論常與無常並是起用悉皆是迹非常非無常乃可為本四句漸除百非斯絶三寶義第三義曰三寶者法門棟幹群品津梁乃萬物之福田實三清之良徑歸依正本其在兹乎此其致也九天生神章經云三寶尊重九天至真正一經云煩惱數極歸於三寶本際經云三寶輪轉運用無輟又云三寶洞極釋曰請問經云一者道寶二者太上經寶三者大法師寶道以通達為義謂能自通通他又能令凡達理通物至樂太上經者太言極大備包衆理上是勝出超踰衆教經即訓法訓常言由言徑法為萬物軌範常謂衆聖模刊由是得理之所由徑是入道之途徑法師者消魔經注云能養生教善行為人範是法師也孟法師云師者和也衆也謂率徒必衆接物必和盟威經云師和也但和有理有事事和者容人畜衆事同水乳理和者思真詣聖不違玄趣也通稱為寶亦稱為尊者正一經圖科戒品云尊高無上寶貴無價老君經教云迷返知一崇信三寶一曰三寶在無價請問經亦云三寶一曰三尊今依經釋尊以尊高為稱寶以寶貴為名既當體可尊亦從譬為貴當體可尊者太上是號道法王也升玄經云為衆聖之父萬物之母以能生法身慧命故有父母之名令物歸往尊崇故有法王之稱此當體尊也可寶不過金玉人則金容玉質法則玉字金書此當體寶也從譬者尊則譬猶父母寶則諭如珠玉也又三寶體義者大存圖訣云道寶無形之形即太上也此以應身為體師寶者得道之人為我師盟威經云太上道君以形申教是謂師寶以氣應感是謂道寶妙文示法是謂經寶教學品云一天之下一人成太上故法王不得有二化主秪宜在一故以道君正當道寶也斯則皇上之謂誕洪氏之胞入於寶珠證成圓果以此身智為道寶體師寶者初發道意極九聖初心三寶真聖五人行法此之身智為師寶體其有神通分應亦隨本分攝屬師寶所以知五人成衆者按黃籙齋儀云極少五人又玄一真人云太上遣三真與天師監徐來勒度仙公經故知五人方行大法經寶者釋有三家一云以理為體謂文字可滅此則非經理既是常故為經也二云文理合為經理則合常文則合法三云文為經體有理未言無有經稱演立言教方有經名今名若定偏執三家盡滯隨方假説三釋皆通順情而言後解小勝以經教所明多以文為經故也又須知道君本迹是道寶經則有理有教教則金口所説玉簡所書加被印成縑紙傳記是正寶經若九聖已降自説加人或印成他説書之縑紙各能詮理隨分入經稱為傳論此其隨也如五真降授仙公是正師寶若始發道意凡道士共行法者或出家法人無五人衆或五人衆非具足師寶是相隨也圖形寫像表代真人亦隨師也又明太上道君以為寶者色即七十二相八十一好心即四達六通智圓慧滿以此身心莊嚴具足為道寶經寶者經有生善滅惡之用或一句兩句已有此能或多章多偈方具斯力如言寧守善而死不為惡而生一句之中其義各足又如善勝論於真一二真咨於神本乍開譬諭演説會通衆多章句明理乃足然四字成句或詮理用足可是正經一字起時是真經不有師云字字各能詮理一字即是真經今不同此如一寧字未通守善而死如此寧字欲何所道詮用未足故非真經其有單字明理足者即是真經如道字是也師寶者其義有三一者捨家遠俗二者修善學慧三者衆聚行法捨家遠俗者舊舉五事顯其勝功一者棲憑勝處二者依庇明師三者專心在法四者興隆道教五者形與世隔棲憑勝處者本際經云幽隱山林又云依憑精舍升玄經云虛堂空室名曰仙家此謂放曠翛條自然趣善依庇明師者既得勝處宜依上人本際經云願值明師咨受上道又云造事明師靈寶經云非師不傳專心在法者既得勝人宜請妙法本際經云尋訪明師祈請要術三洞妙文靈寶經云所營在法興隆道教者既得玄教宜以化他本際經云願以法音廣宣愚昧請問上經云廣開法門定志經云興顯道士形與世隔者黃褐玄巾披羅衣錦形既殊凡心宜改俗故本際經云衣弊履穿謙光晦迹又云捨俗服玩黃褐玄巾斯以迹引心令超世網就事而言出家最勝既云始受五千文而朝存章服且如靈寶故知未備三洞入師數也二修善學慧者遵法之人本崇行解隔凡成聖真智為優也三衆聚行法者如五真降授葛仙十方聚傳太上升玄經云三當念衆為良福田師之言衆其義明矣但師於三義有具不具若在人間其有捨家披黃修解證智徒衆聚集以人間修得上界真解故三義備也從諸天以上至乎界外不必帔黃巾玄多是七寶為冠九光作帔所以然者始學心劣故寄形殊上方無方任能會理而生明是仙猶衣黃服此自通耳位業義第四義曰位業者登仙學道階業不同證果成真高卑有别三乘七號從此可明十轉九宫因兹用辨此其致也本際經云神官位序真聖階梯靈寶經云位登仙王又云功業無巨細也釋曰位是階序之名業是德行之目大論品次釋者不同徐法師舉洞神經云神人真人仙人道人聖人賢人合共為道太真科云鬼中立功進登鬼仙者皆號靈人神者神妙無方真者堅純非假仙者遷升改化道者虛通不壅聖者正名制作此義多在果入因人言聖者正行居心也賢者辨能才智靈者識鑒通微前六世人得道之名後一鬼神得道之稱又云名乃有七位乃有三一者仙位二者真位三者聖位神道賢靈更無别位名號雖異猶附三階今謂衆經顯名豈唯有七猶如至人智人上人大人也陸先生云起自凡夫積行成道始化曰仙仙化成真真化成聖此即通舉界內九宫界外太清俱是仙品就於真聖合為三階也諸家解釋既殊難可依據今依玄門論中搖亮玄靖二法師義旨凡有兩義一論稟生之位二論證仙之品稟生位者界內有欲觀感生凡三十二品有欲善業為三界四民之位界外是無欲觀感生凡二十七品為三清一乘之位證位品者始自發心終乎極道大有五位一者發心二者伏道三者知真四者出離五者無上道均此五心總有四位前之二心是十轉位第三一心是九宫位第四一心是三清位第五一心是極果位前四是因後一是果初之二心有十轉者發心一位即為一轉伏道之中凡有九轉以一就九合成十轉其初發心亦名遊散位為一轉者是破裂生死回向道場從迷返悟轉俗入道大戒經云善男子善女人能發自然道意來入法門受我十戒則為大道清信弟子皆與勇猛飛天齊功飛天未得道者也是道十轉弟子此入十轉之初也又云若在一轉而行精進心不懈退即得飛天於此而進超凌三界以此發心即為一轉又云清信弟子見在世上度於衆苦身有光明形神澄正制伏魔精故是翻邪來入正道但尋此飛天總是伏位既未得真知之道故云未得道也言為諸天策駕即是九宫真位諸天策駕也伏道之中有九轉者凡三種解解各三轉合成九轉三種解者一曰武解二曰文解三曰尸解四極明科及真迹並云武解者地下鬼帥文解者記形改化仙經云先死後蛻謂之尸解其武解三轉者四極明科及真迹云武解鬼帥二百年一轉凡三等並云世行功德度名東華不預三官之府又云至忠至孝至廉至真者改化更生得為鬼官也其文解三轉者明科云文解主者亦有三等其一等散在外舍間停無事俱在洞天百四十年一進給仙人驅使其二等便徑得遊行仙階給仙人所使百四十年進補管禁如世散吏其三等便得入仙人之堂遊行神州之鄉入宴東華也其尸解三等者其下者或因刀兵或因滅度暫遊太隂或太一守尸三魂營骨也魄衛肉胎靈結氣不久更生其次者蟬蛻或假物代形雖受殯埋隱景而去後開棺中惟見杖舄其上者以劎杖代尸俄爾升化倏然失所在乃遊虛空尋此十轉伏結所招位存似空未登真解始在初門並非乘位宋法師云報有十轉其一轉九轉但在世間八方中央有士得富貴名書東華其十轉上生三界為飛天之人若行六情六度生戒一轉便與飛天齊功故明真經云功齊十轉報位得及飛天也今明度生之戒亦未可明但未真成即居似位其間或有超悟而上或有歷位而升隨根利鈍逐悟深淺似解若成進登其位故因兹十轉入彼九宫度人經云得為九宫真人故知真解若成即登此位也又海空經中所明十轉所謂無憂轉淨心轉釋滯轉通儒轉達解轉善見轉權物轉了機轉大明轉具足轉此之時轉義又不同從轉悟為論非就位而辨即是一經别致耳其九宫位者下三宫地仙小乘三品中三宫中乘天仙三品上三宫大乘飛仙三品乘各三品利鈍平等人故成九宫金籙簡文云地仙天仙飛仙是也地仙遊諸名山天仙飛仙升出三界之表八素真經云太清之下次得九宫之飛仙是也此並是界內無欲真空始入觀妙未能圓虛雖無感生之力而解品可尊故受兹位其下之六宫二乘之業近齊三界二十八天大劫交周不免生死上三宫大乘之業與四民天同雖未登舉已超三界大劫交周災所不及故太真科云已出三界雖未登舉預種民者皆無退轉若運開須化應感下生和光同塵不纍其德接引後生申明道教是知劫壞則飛升上境故有飛仙之名劫成則應為民種故有種民之號但三乘之業根性不同或有超升或有歷位今舉大綱其義如此次界外三清位者太清仙九品上清真九品玉清聖九品三九二十七品同修平等俱入一乘觀有淺深義開差等何者太真科云小乘仙有九品一者上仙二者高仙三者大仙四者神仙五者玄仙六者真仙七者天仙八者靈仙九者至仙中乘真有九品一者上真二者高真三者太真四者神真五者玄真六者仙真七者天真八者靈真九者至真大乘聖有九品一者上聖二者高聖三者大聖四者神聖五者玄聖六者真聖七者仙聖八者靈聖九者至聖通尋三品同用九名而第六一名三位差互仙品用真明真位用仙名聖位用真名此當名真信居中義通上下耳又聖第七沒其天名用仙名此示大能含小餘名盡同者欲示諸名並可互通何者三九不同而俱是無欲觀體不無優劣故有仙真聖殊但知上聖高聖大聖是聖之上品神聖玄聖真聖是聖之中品仙聖靈聖至聖是聖之下品聖品既爾仙真例然此三九若望界內入一大乘其間自論義開三品經亦差等曲辨三乘上云兼而該之一乘道也今釋别名者上者勝上各居一品之上就用為名高者高道其德尊高就德為稱大論其體廣大神明或纍已除天語自然玄者不滯至者各至其初品也仙靈二義已如前釋又位序義者凡有二門一證仙位二感生位證仙位者從九聖以來乃有三位一三清位二九宫位三十轉位具如前釋感生位者略有四位一者界外三清位即三九二十七品仙真聖人同用平等無欲善感生二者三界中間四民天位用斷習氣有欲善感生三者界內二十八天位淨三業有欲善感生四者人中位五戒有欲善感生不論三惡道者真聖是善業不生惡道若語應化此自别門今以品位望感生處者界外三清不明自等其四民天即屬九宫之上三宫其無色四天即齊次三宫其色界上六天即齊下三宫故宋法師釋此六天是不緣不入此則色界十三天已上準真成位降此已下色界十二天準似解位欲界六天及中實業並為散善所感但真聖多寄人者修學故通入遊散位也遊散有三義一者未入伏道二者未得真成三者未能職任俱名遊散然感生仙品兩義自殊今大都準則非為定也所以然者自有遠生界頂而無真成自有近在人中而得自有與品相當而有此觀故此二門不得定準所以知仙品位次而然者飛行羽經云玉清則上清之高神太清則飛仙之高靈八素真經云玉清宫之下真乃上清宫之上真太極宫之上真乃上清宫之下真太清宫之上真乃太極宫之下真從此以下得九宫之飛仙尋此二經並飛仙次太清之下抱朴子引仙經云上士舉形升虛謂之天仙中士遊於名山謂之地仙下士先死後脫謂之尸解此即直取升天曰天仙遊地曰地仙蛻形曰尸解也自然經訣云上仙白日升天中仙棲於崑崙蓬萊等名山空中結宫室下仙常棲諸名山洞室綜理從上生死也又太真科云大甲申之後則為一天之初初中至後學者不異衆生善惡人物皆同一天之中唯一人成太上一人成帝君一人成老君一人成天師學如牛毛得如麟角其間為聖真仙民或停散待迎後聖如是無數又復論出化在他天上或他世間也今謂此等所明實亦無在隨人所宜耳青君云以九天之精氣凝成九宫之位故九宫論位按此為明又八素經云太極者此是太清境中之宫生神章經云三皇洞神太清太極宫此其證也又業行義者向道有二條一願二行故請問上經曰悉從願來非願不成本際經云一切行皆是方便教門也願有二義上求道果下化衆生四等為心是大乘願若近求三界自度為心是小乘願行有四義一術二戒三定四慧術者茹鍊方法丹藥祝請小乘局此一條大乘用為助行升玄經云鍊石茹芝雖壽千年萬歲死輒更苦本際經云服藥茹芝英延壽保命根也戒者防非止惡為生智慧之根靈寶經云智慧生戒根真道戒為主定者觀三守一思神念真本際經云調習靜定靈寶經云思微定志慧者空有兩解欲無欲二觀本際經云慧識明了照悟空有也談講演説並入慧門故徐法師云心有定散即存三守一散即學慧講説引玉京山經云講道靜真請問經云敷顯妙義也用此四義以調身心通論身心復有外內兩行修慧持戒是為內行放生布施造治殿堂名為外行亦名散善今雖開此四條若按經文所論唯二洞神第十一云衆聖所宗唯道與術術即經戒方法是也道即無欲洞虛是也又云習學以無欲為主修術以經戒為先又云無欲洞虛不卒可登故少思寡欲守玄思空積久不怠與道合真今觀此文秪是空有兩慧分門攝事皆盡道是空慧術是有慧若爾者直就慧門攝前行願兩事皆盡講説還屬有慧故洞神經云講説教化密行要術又云術在口內宋法師云行上品十戒口業淨生欲界身業淨登色界心業淨登無色界今謂並有欲善業伏結云淨未是真斷其間得真觀者方斷通欲玄靖法師云至死欲觀心乃除通欲耳且無欲空觀有欲有觀有觀資空空觀導有導有無有有觀無觀故曰真觀真觀亦同無方名道耳道教義樞卷之一
