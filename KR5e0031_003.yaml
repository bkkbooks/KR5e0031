front:
  text: 道教義樞卷之三諸六
  hash: sha256:105dab771de35337a90bdfa4526ad4999cf89ebb00c3ad170be6ff03462eed9b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0031_HFL_003-001a, image: hfl/0763/0763-052.png}
body:
  text: 青溪道士孟安排集兩半義第八道意義第九十善義第十因果義第十一兩半義第八義曰兩半義者凡夫識業起自氤氲欲染飄流淪斯顛倒若能反出則還處自然信任流來終嬰罪垢此其致也定志經云兩半成一其義有五本際經云因縁兩半也釋名體曰兩是二義半語未全成是已就一言會合望一論二故有半名合二爲一故有成稱也其五義者初來五義通染心爲體反出五處合色心爲體舊解云以隂陽二炁爲兩半隂有隂中之隂陽有陽中之陽就於和炁合五義也謹尋經意未見此㫖今明定志經云凡有三不亦以明五義第一不亦明流來通欲第二不亦明初起别欲第三不亦明反出之義初一不亦明流來通欲者此即兩半之義故一通凡有五品即爲五義謂界外氤氲爲一半界内四染爲一半合成通欲爲成一其五品者一氤氲之生三界外二無色界染三色界染四欲界染五三惡道染所欲以爾者定志經云不亦於彼清虚之炁因氤氲之交分半下降就此四半合爲一耶此明神本清虚氤氲妄起氤氲望界内稱之爲半若望清虚亦稱爲半今言分半者正是分聖望清虚之氤氲爲界外之一半下就界内之四半合成一通欲也欲初來之日未有五處望反出時驗有此五何者反出之時還用此處染潤得此處報故也但最初一運即惱即業因果因時任業流來至五品自輕之重同類相生以爲因果然初念起或復何所因今明顛倒所生無有根本若有根本何名顛倒所以知氤氲是顛倒者經云氤氲之交交是交亂猶顛倒之義也此言因者還是顛倒有故云初念即惱即業若爾經云何言神本澄清既本澄清何不澄清爲本耶今明經說澄清爲本者即示無本即其澄清復有何物若其有物何謂澄清故西昇經云本出虚無既知顛倒本來無本即知生死本來無始既知本來無始豈得今來有終故盟威經云衆生根本亦無始終本際經云衆生根本相畢竟如虚空妄想入生死夢幻無始終今言九聖爲終氤氲爲始者是不終爲終不始爲始既以不始爲始無本爲本故云本於虚無與澄清也故本際經云氤者因也氲者暖也世間之法因暖潤氣而得出生是初一念始生倒想體最輕薄猶如微烟能障道果無量知見作生死本元不可測故稱神本神即心耳心無所有故曰澄清但是輕癡未染見著故名無著也第二不亦明初起别欲者有解云别欲所生本於通欲初起極輕與其四民所斷氤氲等漸漸之重與五處同後若退輕如四民重名爲習炁依氤氲起所以知然者以四民之位正斷習炁也但别欲若重任感惡道得其輕報何者經云不亦惑此假一而爲惡者致招自然之炁淪於三徒乎此明縁通欲假一起於别欲得三徒報任業自招故言自然耳通欲言假者此是習因相連爲續假也然初任生惡亦任生善今明惡是濫生所以得自起善是研習所以不得自生也第三不亦明反出義者謂持五戒等善離惡道半淨口業善離欲界半淨身業善離色界半淨心業善離無色界半離四半已修無欲觀以離氤氲既離反兩半本處於自然正真道果也所以然者經云不亦爲善離此四半還登太虚復我清虚之炁反我兩半之本處於自然乎此明離界内四染故云離四半登太虚斷界外氤氲故言復清虚之炁反兩半之本進登道果故云處於自然但知道果超出清虚之本何者氤氲義在有清虚義在無若以無本爲本者此本雖終盡生死義猶未極義若非有非無此乃爲極昇玄經云真道者無不無有不有能覺兩半豈不體之乎但或之所計必有因縁因有傍正正者通欲同類相生前念爲因後念爲果次第相因流至五處傍是貪等别欲縁通欲起也道意義第九義曰道意者入道初心歸真妙趣斷生死之累成慧鑒之明絶有欲之津證無爲之果此其致也釋曰括尋經㫖且有五種一者自然道意謂初發自然之心上求道果下化衆生之大願也但自然之名義可兩屬一者當因即是自然謂任業自然非他使也二者果名自然謂自然正道以化濟爲意能發此願與果相扶因受果名言自然也二者研習道意謂研習以解伏諸煩惑八素經云漸進修習轉得勝明三者知真道意謂習行真智能鑒真理四者出離道意謂出離三界到於道場五者無上道意謂諸智莫過更無勝通名道意者謂是正道之心亦是行前四心得後道果因合名稱爲意又無上道心大慈爲本普濟群品咸使歸真今上求道果即是歸真下化衆生即爲濟物常運此願與道心同四意皆用此心是故名道意也道意雖多今開五者前四是因後一是果因果合明故爲五也十善義第十義曰十善者止滅愆釁則近證人天資生觀慧則遠成真聖若能都遣還趣道場未即虚忘且祖塵内此其致也本際經云五戒十善得三界中七珍依報釋曰一者不殺愍念放生二者不盜常行施惠三者不淫貞潔守愼四不兩舌諫諍解忿五不惡口柔言善語六不妄言言必信實七不綺語語必傳真八不貪欲清廉厭穢九不瞋恚慈心及物十不邪見正解居懷亦不愚癡常習智慧也然癡心之内兼有慢疑慢是輕物疑則猶豫然十善之門義有行止止於十惡行於十善行即是勸勸令修善止即是戒戒令止惡也又十善體義者十惡既以貪瞋癡三毒心爲體十善宜以廉慈惠三善根爲體四施三捨四施者觀身經云財施身施命施識施也財施者金玉資貨施施慈敬二曰身施者身是六情四大明運軀役力救度蒼生策勵身形遵奉大道亦救人危難三曰命施者命是色心連持明盡其性命度人奉道亦是救彼人命令其不斷色心得連爲施四曰識施者識是識知智慧之法以智慧法救度蒼生令彼識知名爲識施也四施之中此施最重論其福報如經無盡河圖下篇云受者施之有五一救貧病二造經書三立治堂四建齋講五供身法服也今括論施不出二種一者財施二者德施本際經云常施財德攝引衆生有德以教愚有財以濟貧然財施有盡德施無窮也因果義第十一義曰因果者示其邪正明此聖凡報應之理無差苦樂之由有局若能雙除兩病必也同會一宗此其致也釋曰因有五名因縁行業根也因者因起亦是因倚召果爲用親而能生縁者助業得果疏而能生行者涉行亦是進趨涉事行因當體爲目進趨來果功用爲名業者義在動作當體爲名亦是造作來果功用爲稱根者以能生爲義謂能生來果亦就用爲名果有三名果報對也果是酬因之目報是答因之名也又因果體義者凡有二義一明出世因果體者因以空解爲體此解破世間故也被導萬行爲資生解縁明道成縁也果者以一切智爲體若因内近論因果者則初解爲習因生後之習果轉轉相生窮乎九聖大智若圓即成道果此之因果與道德名二明世間因果體者善惡二因苦樂二果若縁俱以色心爲體覆其正體唯是心法故靈寳經云善惡報應正由心耳又以四句明之自有心因心是果如習因生果自有色目色是果如種桃還生桃自有色目心是果如附因與附果自有心目色是果如十善得生天也又逐門爲次明於果者大論人天是福果三徒是罪報今論三界有樂無樂凡有二義一者三界皆苦凡夫人天稱樂者此是妄樂而不說其爲苦者次引物令修人天善根情說爲樂耳二者說真解恬愉則任有此樂但體滯無常未是真實欲引迷俗求於真解故說迷心是苦解心是樂故定志經云欲者全是想耳想悉是空既是空想即爲無樂然說有三時一說三徒是苦凡夫人天是樂引其背惡入善諸經皆有此文二說人天亦苦真聖是樂三明真聖亦苦須知世間之内有苦樂常無常淨自在不自在若物能覺則稱爲事物情不覺則謂爲理此非真道之理也若樂常淨及與自在生死中但有其事而無其理以生死中實無此四唯在道境具此四也常者寳玄經云常住之道無祖無先自在者盟威經云湛然常存隱顯自在此自在者亦是我義觀身經云入我無形境長樂快安寧此即兼明我樂也道教義樞卷之三
