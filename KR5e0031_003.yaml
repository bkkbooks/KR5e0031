front:
  text: 道教義樞卷之三諸六
  hash: sha256:105dab771de35337a90bdfa4526ad4999cf89ebb00c3ad170be6ff03462eed9b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0031_HFL_003-001a, image: hfl/0763/0763-052.png}
body:
  text: 青溪道士孟安排集兩半義第八道意義第九十善義第十因果義第十一兩半義第八義曰兩半義者凡夫識業起自氤氲欲染飄流淪斯顛倒若能反出則還處自然信任流來終嬰罪垢此其致也定志經云兩半成一其義有五本際經云因緣兩半也釋名體曰兩是二義半語未全成是已就一言會合望一論二故有半名合二為一故有成稱也其五義者初來五義通染心為體反出五處合色心為體舊解云以隂陽二氣為兩半隂有隂中之隂陽有陽中之陽就於和氣合五義也謹尋經意未見此旨今明定志經云凡有三不亦以明五義第一不亦明流來通欲第二不亦明初起别欲第三不亦明反出之義初一不亦明流來通欲者此即兩半之義故一通凡有五品即為五義謂界外氤氲為一半界內四染為一半合成通欲為成一其五品者一氤氲之生三界外二無色界染三色界染四欲界染五三惡道染所欲以爾者定志經云不亦於彼清虛之氣因氤氲之交分半下降就此四半合為一耶此明神本清虛氤氲妄起氤氲望界內稱之為半若望清虛亦稱為半今言分半者正是分聖望清虛之氤氲為界外之一半下就界內之四半合成一通欲也欲初來之日未有五處望反出時驗有此五何者反出之時還用此處染潤得此處報故也但最初一運即惱即業因果因時任業流來至五品自輕之重同類相生以為因果然初念起或復何所因今明顛倒所生無有根本若有根本何名顛倒所以知氤氲是顛倒者經云氤氲之交交是交亂猶顛倒之義也此言因者還是顛倒有故云初念即惱即業若爾經云何言神本澄清既本澄清何不澄清為本耶今明經説澄清為本者即示無本即其澄清復有何物若其有物何謂澄清故西升經云本出虛無既知顛倒本來無本即知生死本來無始既知本來無始豈得今來有終故盟威經云衆生根本亦無始終本際經云衆生根本相畢竟如虛空妄想入生死夢幻無始終今言九聖為終氤氲為始者是不終為終不始為始既以不始為始無本為本故云本於虛無與澄清也故本際經云氤者因也氲者暖也世間之法因暖潤氣而得出生是初一念始生倒想體最輕薄猶如微煙能障道果無量知見作生死本元不可測故稱神本神即心耳心無所有故曰澄清但是輕癡未染見著故名無著也第二不亦明初起别欲者有解云别欲所生本於通欲初起極輕與其四民所斷氤氲等漸漸之重與五處同後若退輕如四民重名為習氣依氤氲起所以知然者以四民之位正斷習氣也但别欲若重任感惡道得其輕報何者經云不亦惑此假一而為惡者致招自然之氣淪於三徒乎此明緣通欲假一起於别欲得三徒報任業自招故言自然耳通欲言假者此是習因相連為續假也然初任生惡亦任生善今明惡是濫生所以得自起善是研習所以不得自生也第三不亦明反出義者謂持五戒等善離惡道半淨口業善離欲界半淨身業善離色界半淨心業善離無色界半離四半已修無欲觀以離氤氲既離反兩半本處於自然正真道果也所以然者經云不亦為善離此四半還登太虛復我清虛之氣反我兩半之本處於自然乎此明離界內四染故云離四半登太虛斷界外氤氲故言復清虛之氣反兩半之本進登道果故云處於自然但知道果超出清虛之本何者氤氲義在有清虛義在無若以無本為本者此本雖終盡生死義猶未極義若非有非無此乃為極升玄經云真道者無不無有不有能覺兩半豈不體之乎但或之所計必有因緣因有傍正正者通欲同類相生前念為因後念為果次第相因流至五處傍是貪等别欲緣通欲起也道意義第九義曰道意者入道初心歸真妙趣斷生死之纍成慧鑒之明絶有欲之津證無為之果此其致也釋曰括尋經旨且有五種一者自然道意謂初發自然之心上求道果下化衆生之大願也但自然之名義可兩屬一者當因即是自然謂任業自然非他使也二者果名自然謂自然正道以化濟為意能發此願與果相扶因受果名言自然也二者研習道意謂研習以解伏諸煩惑八素經云漸進修習轉得勝明三者知真道意謂習行真智能鑒真理四者出離道意謂出離三界到於道場五者無上道意謂諸智莫過更無勝通名道意者謂是正道之心亦是行前四心得後道果因合名稱為意又無上道心大慈為本普濟群品咸使歸真今上求道果即是歸真下化衆生即為濟物常運此願與道心同四意皆用此心是故名道意也道意雖多今開五者前四是因後一是果因果合明故為五也十善義第十義曰十善者止滅愆釁則近證人天資生觀慧則遠成真聖若能都遣還趣道場未即虛忘且祖塵內此其致也本際經云五戒十善得三界中七珍依報釋曰一者不殺愍念放生二者不盜常行施惠三者不淫貞潔守愼四不兩舌諫諍解忿五不惡口柔言善語六不妄言言必信實七不綺語語必傳真八不貪欲清廉厭穢九不瞋恚慈心及物十不邪見正解居懷亦不愚癡常習智慧也然癡心之內兼有慢疑慢是輕物疑則猶豫然十善之門義有行止止於十惡行於十善行即是勸勸令修善止即是戒戒令止惡也又十善體義者十惡既以貪瞋癡三毒心為體十善宜以廉慈惠三善根為體四施三捨四施者觀身經云財施身施命施識施也財施者金玉資貨施施慈敬二曰身施者身是六情四大明運軀役力救度蒼生策勵身形遵奉大道亦救人危難三曰命施者命是色心連持明盡其性命度人奉道亦是救彼人命令其不斷色心得連為施四曰識施者識是識知智慧之法以智慧法救度蒼生令彼識知名為識施也四施之中此施最重論其福報如經無盡河圖下篇云受者施之有五一救貧病二造經書三立治堂四建齋講五供身法服也今括論施不出二種一者財施二者德施本際經云常施財德攝引衆生有德以教愚有財以濟貧然財施有盡德施無窮也因果義第十一義曰因果者示其邪正明此聖凡報應之理無差苦樂之由有局若能雙除兩病必也同會一宗此其致也釋曰因有五名因緣行業根也因者因起亦是因倚召果為用親而能生緣者助業得果疏而能生行者涉行亦是進趨涉事行因當體為目進趨來果功用為名業者義在動作當體為名亦是造作來果功用為稱根者以能生為義謂能生來果亦就用為名果有三名果報對也果是酬因之目報是答因之名也又因果體義者凡有二義一明出世因果體者因以空解為體此解破世間故也被導萬行為資生解緣明道成緣也果者以一切智為體若因內近論因果者則初解為習因生後之習果轉轉相生窮乎九聖大智若圓即成道果此之因果與道德名二明世間因果體者善惡二因苦樂二果若緣俱以色心為體覆其正體唯是心法故靈寶經云善惡報應正由心耳又以四句明之自有心因心是果如習因生果自有色目色是果如種桃還生桃自有色目心是果如附因與附果自有心目色是果如十善得生天也又逐門為次明於果者大論人天是福果三徒是罪報今論三界有樂無樂凡有二義一者三界皆苦凡夫人天稱樂者此是妄樂而不説其為苦者次引物令修人天善根情説為樂耳二者説真解恬愈則任有此樂但體滯無常未是真實欲引迷俗求於真解故説迷心是苦解心是樂故定志經云欲者全是想耳想悉是空既是空想即為無樂然説有三時一説三徒是苦凡夫人天是樂引其背惡入善諸經皆有此文二説人天亦苦真聖是樂三明真聖亦苦須知世間之內有苦樂常無常淨自在不自在若物能覺則稱為事物情不覺則謂為理此非真道之理也若樂常淨及與自在生死中但有其事而無其理以生死中實無此四唯在道境具此四也常者寶玄經云常住之道無祖無先自在者盟威經云湛然常存隱顯自在此自在者亦是我義觀身經云入我無形境長樂快安寧此即兼明我樂也道教義樞卷之三
