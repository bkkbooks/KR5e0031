body:
  text: 青溪道士孟安排集三洞義第五七部義第六十二部義第七三洞義第五義曰三洞者八會之靈音三景之玄教金編玉字研習可以還源鳳篆雲章修服因兹入悟此其致也故玉經隱注云三洞經符道之綱紀正一經云三洞妙法兼而該之一乘道也本際經云若有經文十二部應三洞者是名正也釋曰一者洞真二者洞玄三者洞神真以不雜為義玄以不滯為義神以不測為義通而為語三名互通何者一乘玄書故是不雜理然無滯三洞妙㫖本自難思故為不測耳從通制别者靈祕不雜故與真名生天立地其用不滯故與玄名召制鬼神其功不測故與神名通稱洞者以通同為義明三教並能通凡入聖又皆同一大乘也然其教跡本洞真教主天寶君為跡本是混沌太無元高上玉皇之氣洞玄教主靈寶君為跡本是赤混太無元上玉虛之氣洞神教主神寶君為跡本是冥寂玄通無上玉虛之氣其跡本之義具如九天生神章經義跡及玄門大論所明今略釋三跡明其次第者天是玄義靈是精義神者無纍之義明始入仙階登無纍境故與神名既進中境智漸精勝故與靈名既登上境智轉無滯故與天玄之名也通名寶君者寶是可尊君是群義明為群生之所尊仰也但知洞真法天寶君住玉清境洞玄法靈寶君住上清境洞神法神寶君住太清境故太上蒼元上録經云三清者玉清上清太清也今明玉者無雜就體為名上者上登逐用為稱泰者通泰體事兼明從著入微配三可解又初登仙域智用通泰名漸之上境故與上同亦可三境並居界表俱可稱上故與上名居中義兼上下三處並無欲染亦上境最優故用玉名以標尊勝此並處從人得名也亦可三清妙處是大道神功當體為名不無其義通言清者以淨為義三清淨土無諸染穢故並言清其中宫室萬緒千端變化難思今不曲盡又三洞體義者尋其人教及境本同一氣赴感適緣作三名說故境教及人寄名不定或以人目境或以境標教因緣相待隨便而言玉緯經云洞神洞玄洞真是三清境號斯即以境因經故言洞神等經也今檢三洞經目不同洞神則言洞神二皇洞玄則言洞玄靈寶洞真雜題諸名此則三皇是逐教緣為題以三皇是禀教之緣故也靈寶是取教主為題以生神用靈寶目君故也洞真無通題雜題諸名者此亦示神無方不可定耳其三洞法體一往既是言教以色聲為體再論並是難思智用亦可以三一為體三清境者一往既是境處可以氣色為體再論既是大道智用不可思議人法不二亦具三一為體即精神氣三一也蓋法師云境雖是三不壞是一又序三洞經洞者其卷數題目具如陸先生三洞經書目録孟法師玉緯七部經書目陶隱居經目太上衆經目三十六部尊經目等所明今不具辨且論其感降之始序其流化之緣其洞真是天寶君所出玉緯引正一經云元始高上玉帝禀承自然玄古之道撰出上清寶經三百卷玉訣九千篇符圖七千章祕在九天之上大有之宫相傳玉文以付上相青童君封於玉華青宫無景元年又撰一通以封西城山中又太帝君命扶桑大帝暘谷神王撰出三十一卷獨立之訣上經三百首今獨立亦行於世也昔襄城小童以上清飛步天綱躡行七元六紀之法降授黃帝竟無所傳元封元年七月七日西王母上元夫人同下降漢武於咸陽宫授五帝靈飛六甲上清十二事明年天火燒柏梁臺經飛太空於兹世絶太元真人茅君諱盈師西城王君受上清玉珮金璫三景躔旋之道以漢宣帝地節四年三月升天又玄洲上卿蘇君諱林師涓子受上清三一之法亦以宣帝神爵二年三月六日登仙不傳於世起漢孝平皇帝時西城真人以上清三十一卷於暘谷之山授清虛真人小有天王褒以晋成帝之時於汲郡修武縣授紫虛元君南嶽夫人魏華存以咸和九年乘飈輪而升天以經付其子道脫又傳楊先生羲晋簡文皇帝之師也羲師南嶽夫人受上清大洞真經三十一卷至晋孝武皇帝太元十三年升仙又許先生邁字叔玄小名映改名遠遊師南海太守鮑靚受上清衆經後渡江入赤城山往而不返遠遊弟謐仕晋為護軍長史散騎常侍亦受行衆經隱景去世謐子玉斧長名翽字道翔師先生受上清三天正法曲素鳳文三十一卷遁跡潜化玉斧子黃民民子豫之以宋元嘉十二年隱剡之小白山以上清靈寶經三洞妙文寄剡縣馬朗之家宋有道士樓化以宋明皇帝太始之末潜因後堂道士殳孝真密啓明帝逼取經還帝使開看忽有五色紫光洞焕眼前逮元徽元年馬乃出訴啓請先者經有敕聽還天藏既開太陽難掩齎持重寶詣馬輻臻兹乃上真注筆未簡凡庶摹而傳奉號曰真跡目序所明與此同也洞玄是靈寶君所出高上大聖所撰今依元始天王告西王母太上紫微宫中金格玉書靈寶真文篇目十部妙經合三十六卷按太玄都四極明科曰洞玄經萬劫一出今封一通於太山一通於勞盛山昔黃帝登峨眉山詣天真皇人請受此法駕龍升天帝嚳之時九天真王駕九龍之輿降牧德之臺授帝此法帝後封之於北鍾山夏禹所感之經出沒有異按真一自然經云太極真人夏禹通聖達真太上命鈔出靈寶自然分别大小劫品經中山神祝八威召龍神經又云徐來勒等三真以己卯年正月一日日中時於會稽上虞山傳仙公葛玄玄字孝先於天台山傳鄭思遠吳主孫權等仙公升天合以所得三洞真經一通傳弟子一通藏名山一通付家門子孫與從弟少傳奚奚子護軍悌悌子洪洪又於馬跡山詣思遠盟受洪號抱朴子以晋建元二年三月三日於羅浮山付弟子海安君望世等至從孫巢甫以晋隆安之末傳道士任延慶徐靈期之徒相傳於世于今不絶洞神是神寶君所出西靈真人所撰此文在小有之天玉府之中序曰云小有三皇文本出大有皆上古三皇所受之書亦諸仙人所受以藏諸名山其蜀郡西城峨眉山具有此文抱朴子云昔黃帝東到青丘過風山見紫府先生受三皇內文晋時鮑靚學道於嵩高以惠帝永康年中於劉君石室清齊思道忽有三皇文刊成字仍依經以四百尺絹告玄而受後亦授葛法子孫按三皇經序鮑君所得石室之文與世不同洪或兼受也陸先生所得初傳弟子孫後傳陶先生先生分折枝派遂至兹也七部義第六義曰七部者應跡垂文隨機演教括囊衆法普被群生若能遊此妙門則得自然懸解此其致也釋曰七部者今依正一經次一者洞神部二者洞玄部三者洞真部四者太清部五者太平部六者太玄部七者正一部正一部前之三部具如三洞義明今釋後四太清者孟法師云大道氣之所結氣清體太故曰太清以境曰經也今謂此經從所輔之境得名何者此經既明金丹之術服御之者遠升太清故言泰清也太平者太言極大平謂和平明六合大通為一正平之氣斯行故太平經云今平氣行矣有解三台正為太平有解景星見曰太平今明此經見世能使六合同文萬邦共軌君明物度可謂太平太玄者舊云老君既隱太玄之鄉亦未詳此是何所必非攝跡還本遣玄之又玄寄名太玄耶今明此經名太玄者當是崇於重玄之致玄義遠大故曰太玄正一者盟威經云正以治邪一以統萬又言法文者法以合離文以分理此言衆生離本所以言離故下文云反離還合合真捨僞由法乃成也言統萬者總攝一切令得還真故下文云一切學悟少欲欲少近乎道宗宗道在乎一式也治邪者文云衆生根粗去道奢邈大道慈愍立法訓治趣令心開兩半成一一成無敗與常道合真故曰正一法文今明正是不邪一者非二此經正義以破邪迷雖說百途終歸一理故云正一也通言部者以部别為義三部同言太正一獨稱正者以三部輔於三洞大法故同言太正一遍陳三乘簡異邪道故稱為正也又論四部緣流者其卷數題目亦如諸家目録所明今序其因起者太清以太一為宗老君演說九君申明道要云太清中經元始中來出於九老傳付老君真人祖襲不絶皆關此君正一經云太清金液天文地理之經四十六卷此經所明多是金丹之要又是緯候之儀今不詳辨墨録所明即漢安元年太上將此經付於天師因此至今也太平者此經以三一為宗老君所說按甲部第一云學士習用其書尋得其根根之本宗三一為主然其卷數或有不同今甲乙十部合一百七十卷今世所行按正一經云有太平洞極之經一百四十四卷此經並盛明治道證果修因禁惡衆術也其洞極經者按正一經漢安元年太上親授天師流傳兹日若甲乙十部按百八十戒云是周赧王時老君於蜀授琅瑘干吉至漢順帝時宫崇詣闕上其師干吉所得神書百七十卷號太平經帝不信之其經遂隱近人相傳海嵎山石函內有此經自宋梁以來求者不得往取輒值風雨冥暗雷電激揚至于陳祚初開屢求弗獲陳宣帝雅好道法乃屈周智響法師往取此經法師至山清齊七日未取頃之雲霧幽晦法師聳慮才至天光朗然乃命從人開函取經時數十許人開不能得法師暫用手扶豁然而啓因得此經請還臺城帝見迎禮置於至真觀中仍請法師於觀開講爾時利安天下國致太平自此以來斯文盛矣帝因法師得經故號為太平法師也太玄者重玄為宗老君所說故道君序訣云玄玄道宗又太玄經云旡無曰道義樞玄玄而尹生所受唯得道德妙真西升等五卷按正一經云太上親授天師太玄經有二百七十卷推檢是漢安元年七月得於此經爾來傳世乃至今日也正一者真一為宗太上所說正一經云正一遍陳三乘又云天師自云我受太上老君教以新出道法王長慮後世改易師法故撰傳録文名為正一新出之儀四十二卷玉緯經云昔元始天王以開皇元年七月七日丙午中時使三天玉童傳皇上先生白簡青録之文自然得乎此法虛無先生傳於唐堯又後聖帝君命小有天王撰集宣行昔漢末天師張道陵精思西蜀太上親降漢安元年五月一日授以三天正法命為天師又付正一科術要道法文其年七月七日又授正一盟威妙經三業六通之訣重命為三天法師正一真人按正一經治化品墨録云正目經九百三十卷符圖七十卷合千卷付天師師既升天以此法付嗣師等弟子一切內外至信者修行傳習屢有得道之人今不具載此文因兹行矣又七部義例者强名立教隨成隨滅雖復一時匠物而不自越正宗言乖理會每須融釋正一法文經圖科戒品云今一天之下內外要文自開闢以後至於劫終中國十二萬三千卷四方夷蠻戎狄各八萬四千卷此並重理同辭異陳粗細分卷無定國于三皇至于三代高上老君為師取要有一萬三千卷也其大略如此又須知三洞四輔自相輔成正一經圖科戒品云太清經輔洞神部金丹已下仙品太平經輔洞玄部甲乙十部已下真業太玄經輔洞真部五千文已下聖業正一法文宗道德崇三洞遍陳三乘太平經云輔者父也扶也今言三太輔三洞者取其事用相資成生觀解若父之能生也衆生鈍劣聞深教不解更須開說翼成方能顯悟即是扶贊之義也所以太清輔洞神者洞神召制鬼神必須太清存守太一服御金丹助成此道神用乃申洞玄和天安地保國寧民太平宗教亦復如斯洞真變化無方神力自在故須太玄明空道成此行重玄之心既朗萬變之道斯成故三十九章號無生之說西升妙典示善入無為之宗無為之果既體玄斯致無生之道即洞遣方成正一遍陳三乘者以具經通明三乘之致也陳者申也言末俗根鈍迷於三乘正一遍申明也又三洞總為一乘之教故正一云三洞雖三兼而該之一乘道也太玄為大乘太平為中乘太清為小乘正一通於三乘也又一切言教皆起人間三惡道苦非受道器三界著樂不能進修若聖人逐結生天自修觀行不須教法若欲聞教皆下人間三清二相得自是不言之教唯人是道器為造行之初故顯應說經在人間也若論聖化無定變轉非常天上人間亦無恆准但從多實義好起人中耳又觀身經云善開方便敷究竟者本際經云究之言斷竟之言盡斷煩惱習一切皆盡具足解脫是名究竟玄門論云究竟是辨成敗之名方便是善巧之目以善巧因緣使得成辨故升玄經云功業罪行畢則常一也一往以二乘為方便大乘為究竟次以三乘為方便一乘為究竟窮論一之與三並為方便非一非三是為究竟乃至化主化處化法化緣皆是方便究竟也又按靈書經云元始天尊告太上道君龍漢之時我為無形常存出世教化我過去後億劫無光逮至赤明我又出世號無名之君以靈寶教化逮至開皇靈寶真文開通三象我於始青天中號元始天尊今說是經以度可度之人斯則此劫之初天尊正為教主至乎上皇元年禪與太上道君為今天花王故本行經云赤明開運歲在甲子誕於浮刀蓋天西那玉國與靈寶同出度人元始天尊以我因緣之勳錫我太上之號封鬱悅那林昌玉臺天帝王位登高聖治玄都玉京此言赤明即是今劫開圖謂之赤明非前赤明劫也不言上皇者是總言今劫耳十二部義第七義曰十二部者文該七部義本三乘窮理則出乎死生入悟則登乎常樂此其致也正一經云三乘所修各十二部本際經云總括法門唯十二事部類分别隨根不同釋曰十二部義通於三乘今依本際經釋第一本文第二神符第三玉訣第四靈圖第五譜録第六戒律第七威儀第八方法第九衆術第十記傳第十一讚頌第十二章表第一本文者三元八會之書長行源起之例是也真誥紫微夫人云三元八會之書太極高真所用本者始也根也是經教之始文字之根又得理之無萬法之本文者分也能詮理也既能分判二儀又能分别法相既能辨折萬事又能表詮至理也第二神符者即龍章鳳篆之文靈跡符書之字是也神以不測為義符以符契為名謂此靈跡神用無方利益衆生信如符契第三玉訣者即河上公釋柱下之文玉訣解金書之例是也玉名無染訣語不疑謂决定了知更無疑染第四靈圖者如舍景五帝之象圖局三一之形其例是也圖度也謂度寫玄妙傳流下世第五譜録者如生神所述三君本行之陳五帝其例是也譜緒也録記也謂緒記聖人以為教法亦是緒其元起使物録持也第六戒律者如六情十惡之例是也戒者解也界也止也能解衆惡之縛能分善惡之界又能防止諸惡也律者率也直也栗也率計罪愆直而不枉使懼栗也第七威儀者如齊法典式請經軌儀之例是也威是儼嶷可畏儀是軌式所宜亦是曲從物宜而為威制也第八方法者如存三守一制魄拘魂之例是也方是方所法者節度明修行治身有方所節度也第九衆術者如變丹鍊石化形隱景之例是也衆多也術道也修鍊多途為入真初道也第十記傳者如道君本業皇人往行之例是也記志也傳傳也謂記志本業傳示後人也第十一讚頌者如五真新頌九天舊章之例是也讚以表事頌以歌德故詩云頌者美盛德之形容亦曰偈者憩也四字五字為憩息之意耳第十二章表者如九齊啓願三會謁請之例是也章明也表奏也謂申明心事上奏大道之通言部者以部類為義亦以部别為名謂别其義類以相從也又十二部由序者按靈寶真文上卷云本文名空陳赤書景皇真文初應唯是一文之經隨五帝所掌開為五篇東方安寶華林青靈始老帝君名靈威仰所掌真文名曰生神寶真洞玄章南方梵寶昌陽丹靈真老帝君名赤熛弩所掌真文名曰南雲通天寶襟中央玉寶元靈元老帝君名含樞紐所掌真文名曰寶劫洞清九天書西方七寶金門皓靈皇老帝君名曜魄寶所掌真文名曰金真寶明洞微篇北方洞隂朔單鬱絶五靈玄老帝君名叶光紀所掌真文名曰元神生真寶明文五老玉篇皆空洞自然之文也今泛論古今變文凡有六種一者天書隂陽初分有三元五德八會之義以成飛天之書後撰為八龍雲篆明光之章陸先生解三才謂之三元三元既立五行咸具以五行為位三五相合謂之八會為衆書之元又有八龍雲篆明光之章自然飛玄之義結空成文字方一丈肇於未天之內生立一切也按真誥紫微夫人說三元八會建文章之祖八龍雲篆是其根宗所起有書之始而先生云八會三才五行便是既判之後赤書又云靈寶赤書五篇真文出於元始之先即此而論三元應非三才五篇應非五行也正應是三寶文人之三氣三氣自有五德耳故九天生神章經云天地萬化自非三元所育九氣所導莫能生也故知三元在天地未開三才未有之前也三元者一曰混洞太無元高上玉皇之氣二曰赤混太無元上玉虛之氣三曰冥寂玄通無上玉虛之氣五德所本有三即隂陽和隂有少隂太隂陽有少陽太陽就和中之和為五德也篆者撰集靈書謂之雲篆此則三元八會之文皆是天書也二者演八會為龍鳳之文謂之地書此下玄聖所述以寫天文也三者軒轅之時蒼頡傍龍鳳之勢採鳥跡為古文以代結繩即古體也四者周時史籀變古文為大篆五者秦時程邈變大篆為小篆六者秦後盱陽變小篆為隸書又云漢謂隸書曰佐書或言程邈獄中所造出於徒隸故以隸為名是為六文也又有八體六書今不具叙耳又漢和帝時蔡倫始造紙爾前唯書簡牒牒者詮牒語事簡者在簡不繁但知本是天書以下八體六文皆從真文出耳又蒙恬造筆精能故稱蒙恬造筆也然未知何時書經於紙卷今謂劫初已自有筆太真所書何容無紙及以八體六文等耶以天尊造化具一切法故也但後人承用自有前後耳神符者明一切萬有莫不以精氣為用故二儀三景皆以精氣行乎其中萬物既有亦以精氣行乎其中也是則五行六物莫不有精氣也以道之精氣布之簡墨會物之精氣以却邪僞輔助真教召會群靈制御生死保持劫運安鎮五方然此符字本於結空太真仰寫天文分置方位區别圖象符書之異符者通取雲物星辰之勢書者别折音白詮量之㫖圖者盡取靈變之狀然符中有書參以圖象書中有圖形聲並用而三洞經中符有作今字者此亦如古文尚書有與今字同者耳玉訣者此别有經二卷太上道君於南丹洞陽上館為學士王龍賜說此靈文玉字之訣但求知定是何代所注又說諸修符醮五方思存移灾等法然正是解訣八會之文也靈圖以傳有書以傳無無者言之與理無有形跡定志圖局之例是也有者有形之與跡八景及人鳥之例是也或鎮之五嶽保制劫運或廣被十方開化周普或宣之上古極物之迷或傳之下世哀物之苦皆大慈之德隨病設方大哀之心赴緣說法也譜録者譜如生神章前三寶君及本行道君自序宿世根本之例是也録者修别神真位次名諱八景及內音之例是也譜之用者衆生或謂生死之理欻然而有欻然而無如彼草木無所緣起故述源本宿因令其得悟録亦是修牒名領以付學人令其領録存思以自防保共舉人身以升天也戒律者戒止也法善也止者止惡心口為誓不作惡也戒之為義又有詳略詳者太清道本無量法門百二十九條老君及三元品戒百八十條觀身大戒三百條太一六十戒之例是也略者道民三戒録生五戒祭酒八戒想爾九戒智慧上品十戒明真二十四戒之例是也律者終出戒中無更别目多論罪報刑憲之科如天師制鬼玄都女青等律具斯則戒主於因律主於果以戒論防惡律論止罪故也威儀者三元本有威儀俯仰之格三千四百龍漢之後文多不備此以末世不堪故略不傳耳其論齊功德凡有二種一者極道二者濟度極道者洞神經云心齊坐忘至極道矣本際經云心齊坐忘遊空飛步濟度者依經有三籙七品三籙者一者金籙齊上消天灾保鎮帝王二者玉籙齊救度人民請福謝過三者黃籙齊下拔地獄九玄之苦七品者一者三皇齊求仙保國二者自然齊修真學道三者上清齊升虛入妙四者指教齊禳灾救疾五者塗炭齊悔過請命六者明真齊拔九幽之魂七者三元齊謝三官之罪此等諸齊或一日一夜或三日三夜或七日七夜具如儀軌其外又有六齊十直甲子庚申八節本命百日千日等齊通用自然之法其六齊月者正月三月五月七月九月十一月又有三長齊月即正月七月十月十直者月一日八日十四日十五日十八日二十三日二十四日二十八日二十九日三十日其六齊八節可知今不具辨方法者大略有九一者粗食麻麥也二者蔬食菜茹也三者節食中食也四者服餌符水及丹英也五者服芽五方雲芽也六者服光日月七元三光也七者服氣六覺之氣天地四方之妙氣也八者服元氣一切所禀三元之氣太和之精在乎太虛也九者胎食我自所得元精之和為胞胎之元即清虛降四體之氣不復關外也粗食止諸耽嗜蔬食省諸肥腴節食除煩惱濁保精所以具身神體成英華服芽所以變為芽服光所以變為光服六氣所以化為六氣遊乎十方服元氣化為元氣與天地合體食胎氣所以反為嬰童與道混合為一也此之變化迭運改易不復捨身而更受身往來生死也今意方法未必止是食事其或是方藥按摩等事可尋也以前事跡並出上經靈書紫文經及真誥裴君授道具有此事衆術者無所不通大而論之略有五事一者思神存真二者心齊坐忘三者步虛飛空四者餐吸六氣五者導引三光此皆心氣相使而神道冥通也論其變化凡有三種一者白日升天謂功成道備三萬六千神及三一帝一混合為體成乎妙一故能與神俱遊即身而升天也二者尸解或以刀劎竹木代尸俄爾升舉欻失所在或遺皮殼或受殯埋後開棺中但有杖舄或遊五嶽或可升天南宫有流火之庭金門有冶鍊之水凡生而內飛登天者亦先詣火庭鍊其形神死而升天者亦先詣庭池鍊其魂骸皆隨其功業也三者滅度尸形不灰如太一守尸或經年歲尸還成人也記傳者託則追志過去之事亦有預記未來之事傳者撰也謂相傳係續凡聖神之體略有二事一者自然二者學得也大洞經云得洞經者從死得生從生得道從道得仙從仙得真從真得為上清黃老君三十九真二十四帝百八十道君天尊上聖亦有自然妙氣應化所作亦有修習後成自然後學合為一也然此聖真階次千流萬品今不具顯也讚頌者四言以象四時四氣五言以法五行五德七言以法七元七曜有本文讚頌始九天生神之流以三洞飛玄之氣是本文讚頌也後諸經中或有道君真人諸天讚頌此皆玄聖所作共在經中章表者此修正一遍多但一切萬機其跡各别故聖人垂法制之以事然道在人心而方須表奏者既未能冥會則因事而顯事顯則心明故盡其形跡也夫人心無質運之有境境淨則心明心明則行潔行潔可以交神靈心明可以會天道故登壇告盟黃章表奏使心形俱盡人會神合也章信科云輸物明信信道則捨財消灾解禍大體多名其要有二一者賜與凡夫愛及鳥獸蠕動蝖飛皆同本始二者供奉三尊崇飭三寶周給聖賢同日供養也道教義樞卷之二
