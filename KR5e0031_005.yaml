front:
  text: 道教義樞卷之五
  hash: sha256:ec4054d7113ba035dfd174c0c450b241d4506e1117f142befc863c183a4584c6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0031_HFL_005-001a, image: hfl/0763/0763-086.png}
body:
  text: 青溪道士孟安排集三一義第十六二觀義第十七三乘義第十八原缺三一義第十六義曰三一者蓋是希夷之奧賾神氣之樞機智用則事並有形會歸則趣同無物此其致也洞神經三寰訣云一者精神氣也釋曰精神氣三混而為一精者虛妙智照為功神者無方絶纍為用氣者方所形相之法也亦曰夷希微夷平希遠微細也夷即是精以精智圓照平等無偏希即是神以神用不窮遠通無極微即是氣以氣於妙本義有非粗孟法師云言三言一不四不二者以言言一即成三也又三一體義者徐法師云三一是妙極之理大智之源圓神不測布氣生長貸成靡棄兼二為義即一為體今謂極理之與大智此即境智之名慧源之與貸成即是本跡之目故未為定也玄靖法師解云夫妙一之本絶乎言相非質非空且應且寂今觀此釋則以圓智為體以圓智非本非跡能本能跡不質不空而質而空也且三一圓者非直精圓神氣亦圓何者精之絶纍即是神精之妙體即是氣亦神之智照即是精神之妙體即是氣亦氣之智照即是精氣之絶纍即是神也三一既圓故同以精智為體三義並圓而取精者名未勝也又三一修守義者三一所修宗在靜定洞真消魔經云智者守一諦定心源老君戒經云凡存一守神要在正化心正由靜靜身定心心定則識靜識靜則會道也今之所明略顯三義一者方便二者正觀三者轉緣一者鳴鼓以召衆也夫為正觀之道欲使邪氣不侵必須集會群神以自匡輔洞真經云左為鍾右為磬中為鼓或三十六通應三十六天或三十二通應三十二天或二十七通應於九天三九之數或二十四通應三八二十四神或十二通應十二神或九通應九宫或七通應七元或三通應三元隨數所應以相召也二者咽津津者津液即是泉源泉源流通則為安身之本泉源壅塞則為亂志之由故須咽津液以溉灌百神然後恬心以守三一其數所應具如鳴鼓三者拘魂制魄魂為陽神其義主生好人以善魄為隂神其義主死好人以惡若不為善伏惡焉能入正除邪故須制魄拘魂方可存三守一也正觀者正存三一具如本經今詳釋轉緣者從氣觀轉入神觀轉變神力示不思議具如二觀義辨二觀義十七義曰二觀者定慧之深境空有之妙門用以調心直趣重玄之致因之蕩慮終歸雙遣之津既從此以得真固由斯而解法此其致也釋曰二觀者一者氣觀二者神觀既舉神氣二名具貫身心兩義身有色象宜受氣名以明定心無難測宜受神名以明空慧故本際經云氣觀神觀即是定慧氣者氣象為義謂所存三一妙氣髣象來應人身神者無方不測為義明空有兩慧並自難思萬行無方理成不測通言觀者以思察為義思存妙一察見無相是名為觀經云平正觀於一切法不取不捨不動不住入一妙門謂為平等亦是無等為等等無所等德等無等等也又氣觀體義者正以觀身靖定為體定有二義一者觀前方便二者正入觀有為氣觀觀無為神觀又云神觀是界外所修氣觀是界內所習今明神氣兩觀是定慧分門即寄身心以明空有氣觀是定亦通空有以妙有為宗神觀是慧亦通有無以真空為主若作空有兩慧分門定法秪是慧家之一事資空義强故别為一觀何者一切萬行並入有慧但是觀空即入空慧也又須知若於定慧理明了身心不二觀有五種三觀第一三觀者一假法觀二實法觀三偏空觀此明小乘之人未能玄悟若不遣析不了空今舉實遣空舉空遣實舉空遣空使其於此二境發生空解故須此三也假法觀者假以權假為義法以法體為義今正明觀大體衆生空我則難空物則易如五廕成我未知何廕是我故莊子云百骸九竅六藏賅而存焉吾誰與為親既無與親理成無我了假法空便為假法觀也實法觀者實是體實為義既知假法是空復須觀察實體何者此之實體從誰而生必是從他生若更為他生即是無窮過若非是無窮即是從空生若謂從空生還須推此空空尚不自豈得言能生即了實法亦無便為實法觀偏空觀者偏是不正之名空是虛通之目謂衆生著有病多故偏說空以遣此病升玄經云捐有者必先之於無體無者以無無為大小乘守教不能遠達本心遂乃運懷偏沈空境是知小乘偏空未極正觀觀此空者以空亦空所以然者本是空於假實故說為空假實尚無空何所立故空亦空也本際經云是空亦空空空亦空也第二三觀者一者有觀二者無觀三者中道觀有觀者有以質礙為義即觀此語有若定礙應得礙無既不礙無何定是礙是故有法非礙不礙以礙為不礙不礙為礙既知不礙為礙即知不有為有於觀者得成觀門有便不礙有既不礙觀豈不通故此有境亦可以不礙為義此之有境深不思議即可具通三義者何體非實故所以即空非不假名所以即有即有故非空即空故非有非空是中道義境既若此觀亦如之仍本為名故言有觀也無觀者無以不礙為義即觀此語無若不礙斷橋之無此應不得既其是礙何定不礙是知無法亦非礙不礙以不礙為礙礙為不礙既知礙為不礙即知不無而無此於觀者還得成門觀既成門即具三義何者無既不無義即如有亦非不無義即如無如無故所以非有如有故所以非無如無非有如有非無是中道義也中道觀者正以體此有無即以非有非無為中道觀觀境既爾觀體亦然遠取意者非本非於有無有無既非非亦非非三觀後意例得如此若作中偏為語則有無為偏非有非無為中一往將無治有有道教義樞卷之五
