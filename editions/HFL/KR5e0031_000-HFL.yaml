  text: 道教義樞序諸四
  hash: sha256:f50d74246c13f4d42adcd5db3cbf32066ff41e8fdc4fb272ae1edca639d51696
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0031_HFL_000-001a, image: hfl/0762/0762-126.png}
body:
  text: 青溪道士孟安排集夫道者至虚至寂甚真甚妙而虚無不通寂無不應於是有元始天尊應氣成象自寂而動從真起應出乎混沌之際窈㝠之中含養元和化貸隂陽也故老君道經云窈㝠中有精恍惚中有象又云有物混成先天地生寂兮寥兮獨立不改周行不殆可以爲天下母蓋明元始天尊於混沌之間應氣成象故有物混成也靈寳無量度人經云渺渺億劫混沌之中上無復色下無復淵金剛乘天無形無影赤明開圖運度自然元始安鎮敷落五篇故知元始天尊以金剛妙質乘運天氣布化陶鈞致分度自然儀象女圖敷鎮也儒書經籍志云元始天尊生於太無之先禀自然之炁沖虚凝遠莫知其極天地淪壞劫數終盡而天尊之體常存不滅每至天地初開或在玉京之上或在五方淨土授以祕道謂之開劫度人然其開劫非一度矣故有延康赤明龍漢開皇是其年號耳其所度人皆諸天仙聖無量上品有太上老君天真皇人五方天帝及諸仙官轉共承受所說之經亦禀元一之炁自然而有非所造爲亦與天尊常存不滅天地不壞則藴而莫傳劫運若開其文自見凡有八字盡道之奥謂之天書字方一丈八角垂光光彩照曜驚心駭目雖諸天仙不能省視天尊之開劫也乃命天真皇人吹轉天音而辯析之真人已下至于諸仙展轉節級以次相授諸仙得之始授世人矣靈寳經云元始天尊以龍漢之年出法度人滅過去後天地破壞無復光明男女灰滅淪於延康幽幽㝠㝠億劫之中至赤明開光天地復位我又出世號無名之君出法教化度諸天人我過去後一劫交周天地又壞復無光明至開皇元年我於始青天中號元始天尊流演法教度諸天真度人本行經云自元始開光已來至于赤明元年經九千九百億萬劫度人本際經云元始天尊爲汝等故權應見身教導開度諸未度者爲後世縁今當反神還乎無爲湛然常寂不動之處又云自我得道以來經無量劫常在世間未曾捨離若應度者恒見我身運會遷移則不能見此劫衆生機宜所感當由道君而得度脫是故我今昇玄入妙汝等肉眼不能見我真實之身謂言滅盡但修正觀自當見我與今無異若於空相未能明審猶憑圖像係録其心當鑄紫金寫我真相禮拜供養如對真形想念丹禱功德齊等貧窮之人泥木銅彩隨力能辦殿堂帳座幡花燈燭稱力供養如事真身承此因縁終歸上道是知元始天尊生乎妙炁忽焉有像應化無窮顯迹託形無因無待演法開教有始有終老君度人明應象之理太玄本際示真寂之由本行論其劫時靈寳標其名號不經穢濁所謂清虚是稱玄妙豈同夫釋氏託生終開右脇老君出世必從左腋乎而悠悠之徒未能窮源討本所以好儒術者但習典墳崇真如者惟觀釋典至於道經幽祕罕有研尋既不知其指歸實亦昧其篇目遂乃各齊其所見多以天尊爲虚誕也故知井蛙不可以語於海夏蟲不可以語於冰信哉斯言信哉斯言洎乎元始天尊昇玄入妙形像既著文教大行玄言滿於天下奥義盈乎寳藏於是繫象探其深㫖子史竊其微詞翻譯之流實宗其要所以儒書道教事或相通了義玄章理歸其一能知其本則彼我俱忘但識其末則是非斯起而世人逐末者衆歸本者稀欲令息紛競於胷中固不可也惜哉莊生有言舉天下皆惑余雖有所嚮庸可得乎其有支公十番之辯鍾生四本之談雖事玄虚空論勝負王家八並宋氏四非赭道正之玄章劉先生之通論咸存主客從競往還至於二觀三乘六通四等衆經要㫖祕而未申惟玄門大義盛論斯致但以其文浩博學者罕能精研遂使修證迷位業之階差談講昧理教之深淺今依准此論芟夷繁冗廣引衆經以事類之名曰道教義樞顯至道之教方標大義之樞要勒成十卷凡三十七條俾夫大笑之流蕭然悟法勤行之士指示玄宗不其善乎不其善乎卷之一道德義法身義三寳義位業義第二卷三洞義七部義十二部義第三卷兩半義道意義十善義因果義第四卷五廕義六情義三業義十惡義第五卷三一義二觀義三乘義第六卷六通義四達義六度義四等義第七卷三界義五道義混元義第八卷理教義境智義自然義道性義第九卷福田義淨土義三世義五濁義第十卷動寂義感應義有無義假實義
