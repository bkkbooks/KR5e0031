front:
  text: 道教義樞卷之八
  hash: sha256:dddcdc44dadbf427ae043239a875c95caa3e8b5069cef2762fe058e14704fbd4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0031_HFL_007-001a, image: hfl/0763/0763-114.png}
body:
  text: 青溪道士孟安排集理教義第二十六境智義第二十七自然義第二十八道性義第二十九理教義第二十六義曰理教者明教之爲教示言則無言忘筌者入其虚源得環者歸其妙㫖此其致也道經云行不言之教也釋曰理是㫖趣爲義教是化導爲義又理是四忘教是言辯今明非離言教有四忘即悟言教無言教爲四忘耳若了言教無言教亦識四忘非四忘也今示理教略有二種一者方便二者究竟開方便門令得悟入其方便理教者如戒詮戒理施詮施理究竟理教者即緫六度諸教七部等經以教爲法秪悟戒非戒文非文文字性空爲究竟經捨於言教得無言之理今明秪了言教即無言教名爲得理非離言外别有無言之理昇玄經云仙道無不無有不有此即其義又理教機縁漸頓義者隨機作教略有五種一者漸頓自淺之深爲漸一時具說爲頓如初示太清次至太平此爲漸教也如尹生即說道德此頓教也鈍機須漸利根須頓二詳略者說廣文繁爲詳麤舉要徑爲略略如八字之音詳如七部之說三淺深者談極理爲深說近事爲淺淺如丹符小術深如空玄妙理四權實者因修舊理爲實反常合道爲權亦由縁有難易易者示之以實難者化之以權五廢興者除彼邪法爲廢隆此正教爲興興如三天隆於盛漢廢如六天息於諸夏境智義第二十七義曰境智者縁教之深名心理之殊號境稱唯二義在兩忘智照有三言歸四絶此其致也智慧者標源攝流知歸不惑也釋曰境以境界爲義智以决了爲義照有爲智識空爲慧又境智體義者境是頑法智是四絶知若四忘則會真境今明智是境智不可定知境爲智境當是頑法者若謂智定智謂境定境非真境頑在智亦頑若知不智而智不境而境非真智在境亦知道以無知之知無所不知斯則了於一切然則不境之境境義在外不智之智智則在内内則一切智心外則一切境法内外不二境智無殊不殊而殊不二而二耳智慧凡有三章謂本智觀智生智也本智寂然不動空有雙觀權實並照本智之中而有二用照空爲觀智照有爲生智宋法師云道智實智權智是爲三智道智者即起本無謂始自生成次能化道實智者即觀身守一之智謂道即無形應便有體則以觀身爲教令存於神權智者謂方便之力徧於萬境廣開法教隨病受藥亦云義者宜也曲成物宜又三智義用者一成我大哀者觀於衆生本皆非無非有衆生倒惑起有無見乖本逐末淪於苦海所可哀二所以化物者衆本若不是非無非有聖則不化以其本非有無所以得化三說道正性者以衆生本性非是有無畢竟清淨是真道性罷除偏執者以凡滯有聖人一性說無以治有病若玄悟者即知有不有無亦非無又三分身者不二而二故一身無量身二而不二故無量身一身也如是既知二不二亦導自然宜治此也四治常計者物謂皆有本性必應成道執計我人以爲常實自然義第二十八義曰自然者本無自性既無自性有何作者作者既無復有何法此則無自無他無物無我豈得定執以爲常計絶待自然宜治此也釋曰示因縁者强名自然假設爲教故自是不自之自然是不然之然不然之然無所不然不自之自無所不自無所不自故他亦成自無所不然故他亦成然他既成然亦是他然然則他之稱然亦是不然之然然之稱他亦是不他之他不他之他無所不他故自亦成他不然之然亦無所不然故自亦成然是則自之與他俱有然義今但明自然者以他語涉物義成有待自名當已宜以語絶也故本際經云是世間法及出世法皆假施設悉是因縁開方便道爲化衆生强立名字耳道性義第二十九義曰道性者理存真極義實圓通雖復㝠寂一源而亦備周萬物煩惑所覆暫滯凡因障累若消還登聖果此其致也太玄經云言道性者即真實空非空不空亦非不空道性衆生皆與自然同也釋曰道以圓通爲義謂智照圓通性以不改爲名謂必成圓果裴君道授竟而謂之妙成而謂之道用而謂之性今言見者取其觀境之義成者證果顯時用者在因隱日以物資真性其用乃成故在因時目之爲用亦曰真性道名在果即指圓極法身性語在因謂有得果之性此解雖强亦未通理若道定在果性定在因則性非真道真道非性何謂衆生有道性耶今明若礙心解者一解一病正意道性真性不有不無何在不在西昇經云爲正無處此何所在又云正自居之復何不在故無在而無所不在在因即因在果即果在因即爲因性在果即爲果性且尋道性正理非有非無何名何性既以不性爲性不名爲名亦不通言通不别言别也論其别致義類無邊收來而言略開五種一正中者中是不偏之名正是不邪之目正道真性不生不滅非有非無無名正中道二因縁性者因是能生者是由藉故設境教爲悟解之因縁由此因縁生智成道三觀照性者因也通名即有無二觀照有無二境因有入無明照真境發生妙觀四智慧性者即是極果㝠寂玄通大智慧源五無爲性者即是智慧斷除因果二累神無之無爲也又道也又道性體義者顯時說爲道果隱時名爲道性道性以清虚自然爲體一切含識乃至畜生果木石者皆有道性也究竟諸法正性不有不無不因不果不色不心無得無失能了此性即成正道自然真空即是道性昇玄經云臣知道反俗何以故法性空故經云貸氣禀氣者此明衆生之本本來清淨顛倒妄起因知有識神一念神起即滯染故欲凡業既弱不能自生須假應炁貸生接引既生之後方假研修智慧若圓即成至道譬猶竹笋未起之日事在虚無一念笋生即帶皮出生力既弱不能自生須假天雨助令成笋及其作竹漸漸除皮皮盡竹成無皮如本竹成之日不更生皮亦論智圓之時不更起倒也西昇經云道非獨在我萬物皆有之是據有知不論異識也今未安此釋若有知有性無知無性則應道在有知不在無知若有知與無知大道無不在亦應有知與無知理實皆有性若有知無知皆有性亦應有識無識皆成道若有識與無識遂有成道不成道亦應有知與無知而得有性有無性也今意者道性不色不心而色而心而心故研習可成而色故瓦礫皆在也道教義樞卷之八
