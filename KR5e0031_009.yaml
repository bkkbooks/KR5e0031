front:
  text: 道教義樞卷之十
  hash: sha256:f99b8f229ba352c9be960dc4afa7b31d7687a174660f466786db6a8c9bc399ac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0031_HFL_009-001a, image: hfl/0763/0763-138.png}
body:
  text: 青溪道士孟安排集動寂義第三十四感應義第三十五有無義第三十六假實義第三十七動寂義第三十四義曰動寂者道應萬方神凝一理名生於本跡事出乎假真爰開動寂之談方申體用之義此其致也釋曰動以應動爲義故無所不動寂以本寂爲義故無所不寂無所不寂寂復寂動無所不動動復動寂由此而言義通四句一動寂句者即含兩義一者由跡顯本本之言寂即是動寂二者攝跡歸本亦名動寂經云今當反神還乎無爲湛寂常恒不動之處二寂動句者亦含二義一者由本乘跡之言動即是寂動二者從本起跡亦名寂動三動動句者即是動而又動從跡起跡分身化身即是其義四寂寂句者即是寂而又寂非跡本寂寂至無宗又動寂體用者舊云四絶忘理衆生迷之故入生死聖人體之故與㝠一所㝠之理既寂能㝠之智亦寂也但初發道意誓度衆生不負宿心所以化行行之爲用要在形聲故應入生死形極物聲本無形聲所以爲寂跡有形聲所以爲動至論尚自無動無寂豈得有形有聲既以無動無寂而分動寂亦以無體無用而開體用故以不寂之寂爲體不動之動爲用若言體用並爲用非體非用始爲體者亦動寂並爲動非動非寂始爲寂耳徐法師云動之與寂具有六義一寂然不動二動而不寂三即寂即動四即動即寂五寂而能動六動而能寂理妙難求請爲之諭寂而不動若嵩山盤峙不改於地北辰夐極自處乎天動而不寂天行西轉健而不息水流東趨逝而莫止即寂即動者若臨水看月光逐波摇騖迴觀嶽山從眼轉即動即寂者若乾行不息畢昴常如其度後流未已淮海無逭其源寂而能動者如懸石比竹直置寂然吹擊成音乃爲生動動而能寂者如吹息韻停樂止音謝也今謂若虚壞假設其義可安若執滯定言未爲通理也感應義第三十五義曰感應者出彼機縁起乎凡聖善惡之理既若形聲羽果不差還如影響此其致也洞神經云明智聖師顯文以赴機用用以應感感以文通通則成聖也釋曰感是動求爲稱應是赴與爲名又云感者凡情發動之稱應者聖道赴接之名又感應體義者舊義有六感六應六感者一正感二附感三普感四偏感五顯感六隱感正感者動求之理正由乎心附感者土木無知不能致形生用顯必附有知普感者劫初既淳同感太平之主真文序云建國祚以應圖書導五氣以育萬民此普感也偏感者時稍澆漓人不淳善如關尹獨感周年葛玄獨應吴世此偏感也顯感者四海同聞萬民咸覩如漢文之招河上軒轅之會鼎湖此顯感也隱感者或獨處幽巖如楊羲入漢乍單居靖室若許掾凌霄此隱感也六應者一炁應二形應三文應四聖應五賢應六襲應氣應者元氣布化開生萬物形應者上古之日下知之時未用文字以形率物文應者物情稍澆化須言教徐法師云飛玄之炁結空成文聖應者衆生轉澆須聖出世爲其作棟宇垂衣裳令其了識理源正名百物賢應者聖人既作於前賢人理述於後襲應者襲傳襲也賢聖潜輝凡夫傳述雖曰兩愚亦開縁會此言爲襲應也又無情有情感應有四句一者有情感無情二者無情感有情三者無情感無情四者有情感有情有情感無情者如哭笋抽莖射石飲羽無情感有情者如福地招賢名山集聖無情感無情者如銅山既崩雄鍾便響有情感有情者此義可知也有無義第三十六義曰有無者起乎言教由彼色空若體無物而非無則生成乎正觀知有身而非有則超出於迷途此其致也有無二名生於僞物金液經云有有則甚惑樂無亦未達達觀兼忘同歸於玄既曰兼忘又忘其所忘知泯於有無神凝於重玄窮理盡性者之所體也釋曰有以體礙爲義無以空豁爲義此就麤爲釋若妙無者非體非礙能體能礙不豁不空能空能豁今爲四句通釋一者有有名無無名名本召體有體可召所以有名無體可召所以無名二者無有名有無名有是假僞未足可名無是真實始是可名故本際經云無無曰道三者具如孟法師釋亦是有無之名相待故有四者體了有無畢竟清靜俱不思議故並無名近順物情如第三句也又有無體用者孟法師云金剛火熱水濕風輕若此之徒以爲有體無爲豁然體不可立借理顯相以寂然無形爲體玄靖法師釋云有法有用有體有名無法無用無體無名又云無無體用宜應無名爲說教法假立稱謂體用自有不可假設名乃外來故可假立所以既往之法體用斯盡猶在其名流傳遠世徐法師云有法有名有體有用無法無名無用無體今難此解用附體立既其無體何得有用如諸有相礙不得行用憑無得用用屬於有豈關於無又有無義例者玄靖法師云有劣無勝何者有礙無通有是無常無是常也今明有無二法互相有通礙亦互有優劣無是礙者如斷橋木通是無爲礙有是通者如橋合得通是有爲通有爲勝者則有治斷之能無爲勝者則有治常之用是則有無之義通礙不恒無有之說勝劣非定通不通既爾常無常亦然西昇經云有常可使無無常可使有是知有之與無常與無常亦不可定但通義逐隨縁人去取原其實致究竟皆空故以有無爲假非有非無爲真昇玄經云有無二名生於僞物又云真性常一未始暫有未始暫無真既非有亦非非有真既非無亦非非無也西昇經云道非獨在我萬物皆有之老子經教云道無不在有即妙有無即妙無以此爲論豈離有無别復有道故深論有無義可攝盡但知諸法非直無邊亦自本無所有何攝何盡今言攝者以無攝爲攝無所不攝以無盡爲盡故無所不盡也假實義第三十七義曰假實者明庶物之真僞辯群品之合離若知待有名無則達人我皆淨能明因實成假則了色性本空此其致也經云四大暫相寓五物權時假又假實義例者萬法之本由乎隂陽二氣構於二氣共成五塵五塵成四大五常四大五常共成五根九竅也且法本資於二炁爲實乃以五塵爲實者但二氣渺漫未有定形不爲成假之實然陽是生氣隂是殺氣生殺之義可爲續假之實但能生萬物即是陽氣能殺萬物即是隂氣萬物莫不生滅故皆禀隂陽之氣隂陽是氣法還能生滅萬炁既非心法不能生滅於心此言二氣能生滅者非是任運而經前後乃是别能生殺於彼隂陽是能生滅萬物是所生滅心既不爲隂陽所生而亦生滅者正是性不能住任經前後是理無常也玄靖法師以五塵之法謂爲五氣而五氣之中復有三種一者單氣二者共氣三者亦單亦共塵有七一光二闇三影四響五單臭六單味七單體此七種還是前之三種而並單在一處不與諸塵共無相結構故是單法共塵有五即五色香等也此五不生則已生則共處構成諸法雖復共在一處而體性殊隔故爲實也單塵無所與共爲實炳然至於共塵生則同處安知其體不混而爲一耶若其混一便色中即有味臭中即有聲非謂性别今明以單塵往驗知其性隔猶如柱影秪由色塵若色中有味則影可常而影唯是色故色中無味乃至餘塵例皆如此直是雜亂共居不得混爲一也而不見間隙者猶如善合木人膠著無隙也亦單亦共者即是風大以風之爲性或單在虚空不構諸法如外間飄疾之風或與群有和合成體如衆生喘息之風雖復或單或共而體性唯一唯是一物故是實法今尋風大秪是觸塵以其唯是身根所知非鼻眼所得耳能聽風者蓋是繫物生聲非風自響其目見黑風者亦是風吹黑色故入眼根直置風大非關聲色而莊云大塊爲風似應有色今明直是風氣非有青黄之色也故郭云大塊者無物也既觸塵秪應屬觸而别說風爲大者但獨五單塵用多劣弱唯此風飆其功甚大用異諸塵故别爲大也又解心法凡有兩種一不形心二依形心不形心者是大道智照昇入無形若然獨立此照不與諸法共處不名别者以其能忘彼此遣乎通别故也今明一往對著色人說於此義然夫大道非色非心能色能心無乎不在依形心者復有二種一者依别心即是五情依五根别形而生故也二者依緫形心即是心情以其未能無待託緫七尺宅中故也雖依緫形有善惡諸用而不可離别非異法成故稱爲實四念相連此爲續假也道教義樞卷之十
