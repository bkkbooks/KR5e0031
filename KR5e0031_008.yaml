front:
  text: 道教義樞卷之九十同卷諸九
  hash: sha256:3cee07be9a6cb46391427b8ba94c4218e333fe3726fe32f8aeaf6771f3860bff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0031_HFL_008-001a, image: hfl/0763/0763-128.png}
body:
  text: 青溪道士孟安排集福田義第三十淨土義第三十一三世義第三十二五濁義第三十三福田義第三十義曰福田者明因果之源辨資酬之理猶兹勝也善芽從之以生譬彼良田福實因而遂長此其致也靈寶經云道為無心宗一切作福田釋曰福以富樂為義謂富足七珍樂具亦以備足為義謂樂具備足田以能生為義謂能生善福謂福善填滿諭如世之良田故本際經云自慶身田治法雨也三寶明體即道經也道寶者正取太上道君應身以為田體色身親受供養經寶者若淺而論之教是色聲非善惡性其為田也雖能發福無有資生深而論之言教難思皆是善用其為田也非直發福亦是資生師寶者三寶之中正當田體何者道雖尊貴性一化主又不恆見無所資須經法乃高由人弘闡此之二寶田義不彰惟在師尊於理獨顯何者師寶之法交有資須本際經云通是師寶為良福田此其義也淨土義第三十一義曰淨土者途開汲引事假因緣寶淨業之有誠妙心識之所託此其致也靈寶經云天尊成就五方淨土度一切人釋曰今辨淨土之名略為五句一者土內純是仙人亦名仙人土此如太清二者土內純是真人亦名真人土此如上清三者土內純是聖人亦名聖人土此如玉清四者天尊為化主則名天尊土五者衆生業感亦名衆生土此則天尊衆生衆生天尊因緣淨土難可抑定自在無方不可思議又淨土體義者一往總論即依正報為淨土體依正報者七寶莊嚴八騫彌覆白環生實洞響靈音金精玉池寶臺雲觀也明正報者年修命遠玉貌金容淳善所生常報定命運數限足乃登神仙也即直心名淨土經云三業既淨則六根淨六根淨已則國土淨也藏天內景又云四方國土同一日月運行此即以存旦夕太平經云上天度世者以萬歲為一日其次千歲為一日其次百歲為一日其次乃至十日為一日也三世義第三十二義曰三世者義有去來名興代謝若虛忘遣有便超有欲之體了知無方即踐無為之境此其致也釋曰一過去者過之言度去之言往謂已往已度也二見在者見之言顯在之言存謂顯在於今也三未來者未言未萌來言將兆也通言世者以代謝為義有為之法代故以新也亦名三有過去曾有見在今有未來當有洞真經云曾有衆生發心誓願今有學者皆入法門當有應緣生善家者通言有者經今滅已謂為曾有即時住相謂為今有滅復應生故言當有一法論三世者法若未起為未來此法始生為見在此法今滅為過去又云初念已滅為過去後念未起為未來中念已生為見在皆是有為無常變化遷滅也通論終是生住滅之三時遷動成三世也五濁義第三十三義曰五濁者時代下衰衆生多惱亦澆浮之事明塵纍之由欲令出三界之樊籠入一源之妙域此其致也釋曰一煩惱濁者謂是通欲惱纍行人故名為惱二見濁者謂是别欲分别取著故名為見三命濁者語其短促色心連持故名為命四生死濁者謂是衆生生處非一故名衆生生必滅壞五時運濁者明末世澆漓三災所起劫命使然故名時運經云憐愍將來劫運多惱水火兵災種種疾病又五濁體義者惱見二濁以心為體命與生色心為體時運一濁以假實法總為體本固體明時亂體無時故也所以離欲為二者明欲有通别所以為二命與衆生同是假名而分假為兩者正為凡夫欣生愛命故為二種生是曰成命謂相續也然五濁之中有差有甚何者前二則甚濁本故也後三則差亦通五濁如淨土中亦説遷變生死亦説常命亦説有時也若言聖應五濁故不論耳又三災義者兵病水火也本際經云兵戈水火毒疫災害若陽九百六小劫之會有此三災又云以刀兵為劫以大病為劫以水火為劫此則三災所起三小劫末也又云一小劫末具此三災經戒云水火之災者此兵病萬姓水火蕩汰然陽九百六又有大小陸先生云四百五十六歲為陽九而十陽九四千五百六十歲為一元有此三災也三百六十歲為百六亦有此災此小陽九百六也若四萬五千六百歲為陽九元三千六百歲為百六周此大陽九百六也天地運度經云三千三百年為小陽九小百六九萬九千九百年為大陽九大百六天厄謂之陽九地厄謂之百六也道教義樞卷之九
