front:
  text: 道教義樞卷之四五同卷諸七
  hash: sha256:6a0f27477041d22c9f0c0a0357ddf76e7dc731a950cb5713c0eb2db5a68d0147
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0031_HFL_004-001a, image: hfl/0763/0763-070.png}
body:
  text: 青溪道士孟安排集五廕義第十二六情義第十三三業義第十四十惡義第十五五廕義第十二義曰五廕者緣兹六識生彼四心想受既行遂昏真性廕蓋云殄方曉道宗此其致也升玄經云已入無所入識想心行滅釋曰色識想心行為五廕也色者質礙五根是也識者識著造境心也想者想象追緣心也心者受領知違從也行者行緣生思量也前之三心唯是一念後之一心得有多念通而為語四心之名更互相通初心念是行緣即可名行亦復受緣即可名心亦是妄想即可名想餘三例然通稱廕者以廕蓋為稱此明覆蓋真性情不得開顯滅隂廕蓋乃極道真然五廕之法正以色心為體四心是心五根是也以此五廕合成假人假人御廕有情塵入也玄靖法師云有識萬物同以神氣二法為體故五道不同皆有神識氣象也本際經云從真父母生展轉增長而有身形寄附胞胎世間父母而得生育具足諸根故名聚六根成就於六塵生六種識是名識聚既妄取塵分别假相是男是女山林草木種别名字去來動轉從心想生故名想聚倒想聚已妄生憎愛分别討校善惡好醜領納在心故名心聚既生心已著於所見而起貪欲嗔恚愚癡諸惡過咎造顛倒業起罪福報往反無窮名為行聚所言聚者稍相聚合而得堅成廕蓋衆生令居暗苦此即五廕義也又五廕義例者五廕之法並因五常四大六家所成又云五塵造四大四大造五根今尋由大造根由塵造大塵復誰造尋其本根竟不可得皆是顛倒何有實耶今順説者萬法生成二氣以成五塵構於五塵以成五常四大六家等法構於五常等法以成五根故消魔經云四大暫相寓五物權時假西升經云合會地水火風四氣時往緣五塵之法不取聲塵餘之四塵構成五物等也故金木不生則已生則洪塵色自青黃味自甘苦然四大六家並是隨方開義故六家之內具有四大之火風四大之中亦含五物之水土此等諸義並是四塵所成又合此諸義以為義以此色廕合彼四心而成人也四塵者色香味觸五物者金木水火土四大者地水火風也以勝持為地潤澤為水溫暖為火氣動為風四氣體通故稱為大亦是成物力大小家者一甲寅木主骸骨二甲辰風主氣息三甲午火主溫暖四甲申金主牙齒五甲戌土主肌肉六甲子水主血液具如玄妙經所明又諸法之體莫不賴空七竅五藏資空為質舟車屋宇以無為用而不以空成法者今明空之為理不可分别成壞豈得用其成物體邪今五根七竅有空虛者是有法賴空為用非取此空構為法體也若以空成物體物體既壞空亦應壞便是空有生滅是故不爾又有為法皆悉無常生滅之時不取此時成物體者一解時之為理秪是遷此物體令其不任故不用成體且二氣成色具二生滅豈非時成體邪今明義意不同不可為難若言結氣成則便若言結時語成則不便至論説成不成皆是為物推其構與不構何定實耶又體上聲詮不成體者若言人無詮辨則不成人非無此義但廢興不恆故不成也先構法體然後動聲非是由聲方成法體也六情義第十三義曰六情者事符五廕義假四微既藉境以生心亦因根而發識塵昏漸熾方之弊穢之流惑染頓除自復清虛之氣此其致也定志經云六情一染動之弊穢大戒經云六情恬夷神自歸也釋曰眼耳鼻舌身心情也眼以見色耳以聽聲鼻以聞香舌以知味身以覺觸為義心以知理為義身情亦名手情手是身家運用之要故為名也通情者識之異名謂有情靈異於木石又以成為義上元真書云情成也放六情者凶惡自成制六情者吉善亦成成名是同故曰情也然此六識託根而生從所託為名故言眼等六情也即以六識為體也又六根義者根以能生為義謂能生於識六根之中五根是色一根是心五根能生五識故名為根五識則為心根能生想志於心故名根也徐法師云六根之法並因五常四大所成若爾彼師所有方寸為心根又以五藏為內根故西升經云形神合同更相生成也又六塵義者色聲香味觸理也色者青黃五色聲者角徵五聲香者羶𦎬五香味者辛酸五味觸者冷熱諸觸理者事理諸法也通稱塵者以塵染為義明此六種能染行人亦如微塵能染汙也一師云色香與味各自有塵此三塵中並有觸塵若其非味非色香等異既同是有則並皆有觸俱發身識如耳目等根非直見聞亦覺痛癢一師云此四種法更無别塵一塵之中備有此四其體則共其義則殊如一柱體是色無非色處亦舉體是香無非香處舉體是味無非味處舉體是觸無非觸處但逐根所取義成異耳此師云若有兩塵是則相礙一塵義異不相礙也今明唯彼四塵講成萬法順情説爾究竟皆空何者若色等成諸法色等為誰成細色成粗色細色復誰成若更有能成是則無窮已若也無能成何得有所成故定志經云三世之中三界皆空此其義也又六入義者徐法師云六識之法能受六塵六塵之法能發六識既發既受二義相交以彼外塵來入內識是名六入本際經云六根成就對於六塵生六種識今解六塵並可更相涉入何者塵來發識即是塵入於識識起緣塵即是識入於塵但識法在內塵法在外外來入內義為便也入有二種一者事入二者義入事入者到根發識義入者不到根知也須知塵入等法究竟皆空宜在忘懷勿生愛染故定志經云雖有我身皆應歸空也三業義第十四義曰三業者升沈以之起滅罪福於是從由若三行果修則遐登樂境六根不淨則俯墜苦源此其致也本際經云先當修習三善行法三業既淨則六根淨也釋曰一者身業二者口業三者心業貪瞋等三元是意業口亦有但可議論非為指的故言身口造意業也十惡義第十五義曰十惡者起於三毒生彼七支貪恚作其源殺盜開其未行則剋成惡業止乃翻為善根欲會清虛事資除遣此其致也本際經云起三毒心作十惡業也釋曰身有三殺生偷盜邪淫口有四兩舌惡口妄言綺語意有三貪欲瞋恚邪見一名愚癡嫉妬用此七支三毒為十惡也盟威經云破和合衆亂尊卑惡口罵詈無端呵叱天地又四緣義者身口七支具四緣成業一緣不具業則不成何者如雖具三緣命根不斷則不成殺非是衆生亦不成殺不起想心行心不成故不成殺無有殺心理不成殺唯少一緣故自不成此就小乘七支為語若大乘為論但有殺心即為隂賊故須防也其殺生四者一實是衆生二起衆生想三起有欲殺心四令命根斷偷盜四者一實是他物二起他物想三有欲盜心四使移本處邪淫四者一實是邪境二起邪境想三發邪淫心四身受染樂兩舌四者一是所聞人起前人想二發相謗語三起離間情四發分構語惡口四者一是所罵人二起前人想三起惡罵心四發惡罵語妄言四者一是所欺人二起前人想三有欺妄心四成虛違説綺語四者一是所對人二起此人想三有綺語心四吐非義語凡七支四緣其事如此因貪起七業者如為貪味殊害衆生貪彼資財而為竊盜貪迷邪境行於耽欲貪覓名利興造妄言貪他親愛遂起兩舌貪取人財而生惡罵貪競稱譽非時而説也因瞋起七業者瞋彼故斷命分他而奪財瞋於彼人遂淫他婦瞋恨彼人故欺妄説瞋彼和同而生間構瞋心於物故起惡言瞋恨彼人吐非義語因癡起七業者不解因果故行殺不識道理故橫取乃至愚癡故非義邪説見乃通靖心緣理而生成見之後僻生異執導生七惡其義易尋道教義樞卷之四
