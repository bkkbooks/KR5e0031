front:
  text: 道教義樞卷之七八同卷諸八
  hash: sha256:95e8c345842fa2b03aa08ba241a8bdd99164b644e69161aad527b4f8f6c1fc25
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0031_HFL_006-001a, image: hfl/0763/0763-098.png}
body:
  text: 青溪道士孟安排集三界義第二十三五道義第二十四混元義第二十五三界義第二十三義曰三界者既摽色欲明優劣之階差亦論因果辨升沈之品次若超然出離則遙詣道場猶耽惑深則永乖常樂此其致也釋曰一欲界者以染欲為義內心欲重從以為名二色界者以質礙為義外色顯著從以為名三無色界者無下界色從無為名也通名界者以墟域為義謂各有虛域也亦以界别為義謂業果各殊也亦名為有謂有衆生也按靈寶本元經三十二天以上之四天為種民二十八天分為三界前六天為欲界次十八天為色界後有四天為無色界也所以置三界者然可見知法不出三者一者豁爾虛空二者質礙形色三者緣慮心體就此三法故成三界又為三界凡四種者一者應化三界此則無所不在或在一天之內各各皆有或在一塵之內亦復皆有變化通方不可定也以三十二天是應住境化也二者輪回於三界漂浪而忘反流轉於五通長淪而弗悟是也此論報得也三者流來三界謂從氤氲之氣起三界通執漸漸流來形染六情之時四心五根始具但初來之時實未於三界由返出之時還用此中染纍得此中報故分為三界也四者返出三界者經云復我清虛反我兩半此論修得永斷也若論回三界乃論報得然就報得往論一純惡業得三從報二善惡雜業得人中報三純善業得十八天報此十八天猶有動壞四者不動業得十九天以上至三十二天報也作若有若無觀則生第四天於此天中氣觀轉妙增修四等稍除餘習生四民天洞入道境隨氣升除灾所不及也五道義二十四義曰五道者明善惡之雜報示苦樂之差别戒行是修則受人天之果罪緣不輟仍為地獄之因此其致也一天道二人道三地獄道四畜生道五餓鬼道釋曰一天道者字一大也道氣初應之曰一一統億兆無所不包故號一大天以自然為義言諸天皆果報自然也二人道者人者仁人也謂有仁愛亦以統御為義謂假人御隂陽也三地獄道者謂居在地下囚獄之中也四畜生道者謂為人所畜亦是積惡招生也五餓鬼道者鬼歸也謂去生歸滅無糧常餓也亦有六道即加鬼神道又五道義例自天道即三界四民等天隨其果報輕重而生諸天人道義者圓首法天足方象地心懷二愛謂之為人地獄道者按經有二種一者北酆地獄二者五嶽地獄泰山二十四獄霍山西獄恆山嵩高此四獄正一經云天一地獄皇天九平獄青詔獄有二十四大地獄此並罪業不同或有殊異又五道果報義者五戒生人十戒生天又善有二品重者生天輕者生人也混元義第二十五義曰三氣不分凝積為天地之始萬物初混隂陽成品彙之先然則理運將開所以妙物垂應元和既貸清濁遂分五常於是得宜三界由之合度此其致也釋曰天地混元義者混元之時三氣混沌九氣未分天地未立乍存乍亡三氣既顯天地運開洞神經云大道妙有能有能無道體本玄號曰太易元氣始萌號曰太初一曰太虛其精青其形未有氣形之端號曰太始一曰太無其氣黃其形未有形變有質號曰太素一曰太空其氣白其形亦未有形質已具號曰太極一曰太有一曰太神一曰太氣又曰太玄又曰太上又曰太一其形赤黃質定白素白黃未離名之為混也雜糅未分為沌萬法初首為元故兩半三才五常萬物等法體未别是曰混元形象若分明之開闢劫盡運終還歸破壞復於混沌風澤洞虛似風非風如水非水識苦性昏不可分别也舊云混元之中有粗有妙妙者道氣惟一粗者品物衆多今明道無不在義亦玄妙然道混自别不可相濫故非內非外非非內外能內能外即內即外一多粗妙其義例然大而分之十有二種二者是氣十者是物二氣即隂陽十物即五有識五無識五有識者謂人神鳥獸蟲五無識者謂金木水火土也又釋天地者統也謂統理萬物覆育為功亦言先也謂功始分判清氣先浮亦云顛也居高庇下曰顛玄虛在上曰天天資七曜以成象天清氣立今按生神等經並云積陽成天然論究竟豈有此天故聖化所統並云是氣雖云不有亦復不無非有非無而無而有也太真科云三天最上號曰大羅是道境極地妙氣本一唯此大羅生玄元始三氣化為三清天也一曰清微天玉清境始氣所成二曰禹餘天上清境元氣所成三曰大赤天太清境玄氣所成從此三氣各生三氣合為九氣以成九天九天名號真在洞真經中九天各生三天三九二十七天就本九天合三十六天其名號出外國放品經下天地之數無量八方各有五億五萬五千五百五十五重天地之數亦如今天之四方也其天並在空無之中周回八方然天數甚多或有重下或有疊傍或有比地不可稱紀又藏天經所出東于逮南浮黎西耶尼北單越等四天又釋日月星義者日實也謂其體無虧故名為實三道順行經云陽精為日老君中經云日月者天之司徒司空也玉珮金璫經云日是天魂藏天經云日縱廣二千四十里今分水精暈於內流光照於外其中城郭人民七寶浴池生四種青紅黃白蓮花人長二丈四尺衣朱與四種華同衰同盛故有春秋冬夏四時行焉日行有五風一曰時風二曰徑風三曰助風四曰轉風五曰行風是故制御日月星宿旋行虛無物不休息皆風之帆其綱日月運度虧盈者皆四時之會藏伏冠帶故也按河圖天有三百六十五度日行一度一歲一周天其間盈縮具如别文月者闕也謂有虧闕三道順行經云隂之精為月斯則隂精為體玉珮金璫經云月為天魄藏天經云縱廣一千九百里月暈圍七千八百四十里白銀琉璃水精映其內其中城郭人民亦有七寶浴池月有八騫之林生乎其內月中人長一丈六尺悉衣青色衣亦五風帆其綱也星者成也謂其成定四時五行也亦名宿謂日月之所合宿處也亦人之宿命所係也雌一五老經云五星者五行之精斯則五行之精為體藏天經云北斗九星一星相去九萬里去地四十萬里圍七百二十里皆金精琉璃為其郭玉曜紫暉闡其光其內則諸天人衆真之遊館也其一晝一夜則運轉周天一度其內亦生寶珠林樹也又釋地義者地持也勝持群品載養為用能生百卉舊云地有三山川太平經云地理者三色也謂水土石今按生神等經並云積滯成地是知隂氣所成也按放品洞淵九地三十六音內詺云第一壘色潤地去天九十九億萬里第二壘剛色地去第一地八十一億萬里第三壘石脂色澤地去第二地一百二十億萬里第四壘潤澤地去第三地二十億萬里第五壘金栗地去第四地二十億萬里第六壘金剛鐵澤地去第五地二十億萬里第七壘木制地去第六地二十億萬里第八壘大風澤地去第七地八十億萬里以上八地並去地載周竟四垂不極不窮無邊無際無色無氣也第九壘洞淵無色綱維地九壘之地極下洞淵洞源綱維天地制使不落去第一壘五百二十億萬里九地九壘直下九重各四土皇合三十六皇上應三十六天如是上皇皆位齊玉皇之號但分氣各治上下之别名也又崑崙山下有九地地下有一重水水下有一重風如是風水之地各各有九重更相擎持今之地動者是風水之搖也道教義樞卷之七
